<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>السوبر أدمين - إنشاء المدارس</title>
</head>
<body>
    <div style="padding:50px;">
        <input type="text" id="school-name" placeholder="اسم المدرسة الجديد">
        <input type="email" id="admin-email" placeholder="إيميل المدير">
        <input type="password" id="admin-pass" placeholder="كلمة المرور">
        <button onclick="window.runQuickSetup()">إطلاق المدرسة الآن</button>
    </div>

    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import { collection, doc, writeBatch, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        window.runQuickSetup = async () => {
            const name = document.getElementById('school-name').value;
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;

            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            const batch = writeBatch(db);
            const schoolRef = doc(collection(db, 'schools'));

            batch.set(schoolRef, { name, status: 'active', subscriptionEnd: '2027-06-01' });
            batch.set(doc(db, 'users', cred.user.uid), {
                userId: "ADMIN", schoolId: schoolRef.id, role: 'admin', 
                email: email, authMigrated: true, createdAt: serverTimestamp()
            });

            await batch.commit();
            alert("✅ مبروك! المدرسة جاهزة.");
        };
    </script>
</body>
</html>
