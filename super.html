<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اللوحة المركزية - السوبر أدمين</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; width: 100%; }
        button { background: #1a1a2e; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2><i class="bi bi-plus-circle"></i> إنشاء مدرسة جديدة (نظام الدقيقة الواحدة)</h2>
    <input type="text" id="new-school-name" placeholder="اسم المدرسة">
    <input type="email" id="new-admin-email" placeholder="البريد الإلكتروني للمدير">
    <input type="password" id="new-admin-pass" placeholder="كلمة المرور الابتدائية">
    <button onclick="window.runQuickSetup()">تفعيل المدرسة فوراً</button>
</div>

<div class="card">
    <h2>إدارة المدارس النشطة</h2>
    <div id="schools-list"></div>
</div>

<script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, doc, writeBatch, serverTimestamp, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    window.runQuickSetup = async () => {
        const name = document.getElementById('new-school-name').value;
        const email = document.getElementById('new-admin-email').value;
        const pass = document.getElementById('new-admin-pass').value;

        if(!name || !email || !pass) return alert("يرجى تعبئة كافة البيانات");

        const batch = writeBatch(db);
        const schoolRef = doc(collection(db, 'schools'));
        const adminRef = doc(collection(db, 'users'));

        // 1. إنشاء سجل المدرسة
        batch.set(schoolRef, {
            name: name,
            status: 'active',
            subscriptionEnd: '2027-06-01',
            createdAt: serverTimestamp()
        });

        // 2. إنشاء حساب المدير (المرتبط بالـ schoolId)
        batch.set(adminRef, {
            userId: "1001",
            name: "مدير مدرسة " + name,
            role: "admin",
            schoolId: schoolRef.id,
            email: email,
            plainPass: pass,
            authMigrated: false
        });

        await batch.commit();
        alert("✅ تم إطلاق المدرسة والمدير بنجاح!");
    };
</script>
</body>
</html>
