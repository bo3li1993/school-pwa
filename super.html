<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>السوبر أدمين - قمرة تحكم SaaS الموحدة</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #f1f5f9; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 20px; border-radius: 12px; text-align: center; font-weight: bold; }
        .setup-box { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 30px; }
        input, select { padding: 10px; margin: 5px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; width: 200px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #334155; }
        button { cursor: pointer; padding: 8px 14px; border-radius: 6px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>مركز إدارة المنظومة السحابية (SaaS)</h1>
    
    <div id="revenue-stats" class="grid"></div>

    <div class="setup-box">
        <h3><i class="bi bi-plus-circle"></i> إطلاق منصة مدرسة جديدة فوراَ</h3>
        <input type="text" id="school-id" placeholder="معرف المدرسة الفريد (مثال: salim_school)">
        <input type="text" id="school-name" placeholder="اسم المدرسة المعرب">
        <input type="text" id="admin-id" placeholder="اسم مستخدم المدير (ADMIN)">
        <input type="text" id="admin-name" placeholder="اسم المدير المسؤول">
        <input type="password" id="admin-pass" placeholder="كلمة المرور">
        <input type="text" id="contact-phone" placeholder="رقم هاتف المتابعة (بدون مفتاح)">
        <select id="school-plan">
            <option value="basic">الخطة الأساسية (150 KWD)</option>
            <option value="pro" selected>الخطة الاحترافية (250 KWD)</option>
            <option value="enterprise">الخطة المتقدمة (400 KWD)</option>
        </select>
        <button onclick="window.createNewSchoolPlatformLive()" style="background:#3b82f6; color:#fff;">تشغيل وربط السيرفر</button>
    </div>

    <h3>المنشآت التعليمية المرتبطة بالسيرفر</h3>
    <table>
        <thead>
            <tr>
                <th>اسم المدرسة</th>
                <th>الباقة</th>
                <th>حالة الاشتراك</th>
                <th>تاريخ الانتهاء والمهلة</th>
                <th>تذكير تجديد</th>
            </tr>
        </thead>
        <tbody id="schools-table-body"></tbody>
    </table>

    <script type="module">
        import { db, app } from './js/firebase-config.js';
        import { collection, doc, setDoc, addDoc, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const auth = getAuth(app);

        // 1. توليد المنصة السحابية للمدرسة وحساب الانتهاء بعد سنة تلقائياً وتأمين الهوية السحابية
        window.createNewSchoolPlatformLive = async () => {
            const schoolId = document.getElementById('school-id').value.trim();
            const schoolName = document.getElementById('school-name').value.trim();
            const adminId = document.getElementById('admin-id').value.trim();
            const adminName = document.getElementById('admin-name').value.trim();
            const adminPass = document.getElementById('admin-pass').value.trim();
            const contactPhone = document.getElementById('contact-phone').value.trim();
            const selectedPlan = document.getElementById('school-plan').value;

            if(!schoolId || !schoolName || !adminId || !adminPass) return alert("يرجى ملء جميع الحقول المطلوبة!");

            const oneYearLater = new Date();
            oneYearLater.setFullYear(oneYearLater.getFullYear() + 1);
            const subscriptionEndISO = oneYearLater.toISOString().slice(0,10);

            const virtualEmail = `${adminId}@${schoolId}.hosainan.edu`;

            try {
                // إنشاء هوية معتمدة مشفرة في Firebase Auth
                const cred = await createUserWithEmailAndPassword(auth, virtualEmail, adminPass);
                
                await setDoc(doc(db, 'users', cred.user.uid), {
                    schoolId: schoolId, userId: adminId, name: adminName, role: 'admin',
                    plainPass: adminPass, email: virtualEmail, authMigrated: true, createdAt: serverTimestamp()
                });
            } catch(authErr) {
                console.warn('Auth fallback triggered:', authErr.message);
                await addDoc(collection(db, 'users'), {
                    schoolId: schoolId, userId: adminId, name: adminName, role: 'admin',
                    plainPass: adminPass, createdAt: serverTimestamp()
                });
            }

            await setDoc(doc(db, 'schools', schoolId), {
                name: schoolName, status: 'active', plan: selectedPlan,
                subscriptionEnd: subscriptionEndISO, contactPhone: contactPhone, createdAt: serverTimestamp()
            });

            alert(`✅ تم إطلاق منصة مدرسة ${schoolName} وتأمين حساب المسؤول بنجاح!`);
        };

        // 2. محاكاة تذكير التجديد الفوري للمدرسة المقصرة عبر الواتساب
        window.sendRenewalReminder = (schoolName, daysLeft, phone) => {
            const urgency = daysLeft < 0 ? '🚨 منتهي!' : daysLeft <= 7 ? '⚠️ عاجل' : '⚡ تذكير';
            const msg = `${urgency} اشتراك منشأة: *${schoolName}*\n\n` +
                        (daysLeft < 0 ? `الاشتراك منتهي منذ ${Math.abs(daysLeft)} يوم وموقوف مؤقتاً ❌` : `الاشتراك الحالي ينتهي خلال ${daysLeft} يوم.`) +
                        `\n\nيرجى مراجعة المطور للتجديد ومواصلة الدعم السحابي 📱\n_المنظومة الرقمية الشاملة_`;
            window.open(`https://wa.me/965${phone || ''}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        // 3. المراقبة التلقائية الحية للحسابات المادية ومهل تواريخ الصلاحية بالـ onSnapshot
        onSnapshot(collection(db, 'schools'), snapshot => {
            let activeCount = 0, totalRevenue = 0;
            const tableBody = document.getElementById('schools-table-body');
            tableBody.innerHTML = '';

            snapshot.forEach(docSnap => {
                const d = docSnap.data();
                const id = docSnap.id;
                
                if(d.status === 'active') {
                    activeCount++;
                    const prices = { basic: 150, pro: 250, enterprise: 400 };
                    totalRevenue += prices[d.plan || 'basic'] || 250;
                }

                const end = d.subscriptionEnd || 'غير محدد';
                const daysLeft = d.subscriptionEnd ? Math.ceil((new Date(d.subscriptionEnd) - new Date()) / 864e5) : null;
                const endColor = daysLeft < 0 ? '#ef4444' : daysLeft <= 30 ? '#f59e0b' : '#4ade80';

                tableBody.innerHTML += `<tr>
                    <td><b>${d.name}</b></td>
                    <td><span style="text-transform:uppercase; font-size:12px;">${d.plan || 'pro'}</span></td>
                    <td style="color:${d.status === 'active' ? '#4ade80' : '#ef4444'}">${d.status === 'active' ? 'نشط' : 'موقوف'}</td>
                    <td style="color:${endColor}; font-weight:700;">
                        ${end} ${daysLeft !== null ? `(${daysLeft > 0 ? daysLeft + ' يوم متبقي' : 'منتهي بقفل آلي!'})` : ''}
                    </td>
                    <td>
                        <button onclick="window.sendRenewalReminder('${d.name}', ${daysLeft}, '${d.contactPhone || ''}')" style="background:#fbbf24; color:#000;">
                            <i class="bi bi-whatsapp"></i> إرسال إنذار
                        </button>
                    </td>
                </tr>`;
            });

            document.getElementById('revenue-stats').innerHTML = `
                <div style="background:#1e3a5f" class="stat-card"><h2>${snapshot.size}</h2><p>المدارس المتعاقدة</p></div>
                <div style="background:#1e3a1e" class="stat-card"><h2>${activeCount}</h2><p>المنصات النشطة</p></div>
                <div style="background:#2d2a1e" class="stat-card"><h2>${totalRevenue} KWD</h2><p>الإيراد السنوي المستهدف</p></div>
            `;
        });
    </script>
</body>
</html>
