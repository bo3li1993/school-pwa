<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اللوحة المركزية - التحكم السحابي (SaaS Engine)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .status-active { color: #22c55e; }
        .status-suspended { color: #ef4444; }
        button { padding: 10px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        .btn-suspend { background: #ef4444; color: white; }
        .btn-activate { background: #22c55e; color: white; }
    </style>
</head>
<body>

<h1>مركز تحكم المنظومة الرقمية (SaaS)</h1>

<div class="grid">
    <!-- كرت إضافة مدرسة -->
    <div class="card">
        <h3><i class="bi bi-plus-lg"></i> إضافة مدرسة جديدة</h3>
        <input type="text" id="school-name" placeholder="اسم المدرسة" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px;">
        <input type="email" id="admin-email" placeholder="إيميل المدير" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px;">
        <button onclick="window.createSchool()" style="width:100%; background:#3b82f6; color:white;">إنشاء وتشغيل المدرسة</button>
    </div>

    <!-- كرت إحصائيات النظام -->
    <div class="card">
        <h3><i class="bi bi-graph-up"></i> إحصائيات النظام</h3>
        <p>إجمالي المدارس: <span id="total-schools">0</span></p>
        <p>إجمالي الموظفين المسجلين: <span id="total-users">0</span></p>
    </div>
</div>

<div class="card" style="margin-top:20px;">
    <h3>قائمة المدارس المتعاقدة</h3>
    <table style="width:100%; color:#fff; text-align:right;">
        <thead><tr><th>اسم المدرسة</th><th>الحالة</th><th>تاريخ الانتهاء</th><th>إجراءات</th></tr></thead>
        <tbody id="schools-table"></tbody>
    </table>
</div>

<script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, getDocs, doc, setDoc, updateDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    // 1. عرض المدارس لايف
    onSnapshot(collection(db, 'schools'), (snap) => {
        const tbody = document.getElementById('schools-table');
        tbody.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            tbody.innerHTML += `<tr>
                <td>${data.name}</td>
                <td class="${data.status === 'active' ? 'status-active' : 'status-suspended'}">${data.status}</td>
                <td>${data.subscriptionEnd || 'غير محدد'}</td>
                <td>
                    <button class="${data.status === 'active' ? 'btn-suspend' : 'btn-activate'}" 
                            onclick="window.toggleSchool('${d.id}', '${data.status}')">
                        ${data.status === 'active' ? 'إيقاف' : 'تفعيل'}
                    </button>
                </td>
            </tr>`;
        });
        document.getElementById('total-schools').textContent = snap.size;
    });

    // 2. تفعيل/إيقاف المدرسة
    window.toggleSchool = async (id, currentStatus) => {
        await updateDoc(doc(db, 'schools', id), {
            status: currentStatus === 'active' ? 'suspended' : 'active'
        });
    };

    // 3. إنشاء مدرسة
    window.createSchool = async () => {
        const name = document.getElementById('school-name').value;
        const email = document.getElementById('admin-email').value;
        const id = doc(collection(db, 'schools')).id;
        
        await setDoc(doc(db, 'schools', id), {
            name: name, status: 'active', subscriptionEnd: '2027-06-01'
        });
        
        await setDoc(doc(db, 'users', id), {
            userId: "ADMIN1", name: "مدير " + name, role: "admin", schoolId: id, email: email
        });
        
        alert("تم إنشاء المدرسة بنجاح!");
    };
</script>
</body>
</html>
