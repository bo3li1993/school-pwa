<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>التحكم المركزي - السوبر أدمين</title></head>
<body>
    <div id="revenue-stats" style="margin-bottom:20px;"></div>
    <div id="schools-list"></div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, onSnapshot, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        onSnapshot(collection(db, 'schools'), snapshot => {
            let activeCount = 0, totalRevenue = 0;
            snapshot.forEach(d => {
                if(d.data().status === 'active') {
                    activeCount++;
                    totalRevenue += {basic:150, pro:250, enterprise:400}[d.data().plan||'basic'] || 250;
                }
            });
            document.getElementById('revenue-stats').innerHTML = `
                <div style="display:flex; gap:10px;">
                    <div>المدارس: ${snapshot.size}</div>
                    <div>الفعالة: ${activeCount}</div>
                    <div>الإيراد: ${totalRevenue} KWD</div>
                </div>`;
        });
    </script>
</body>
</html>
