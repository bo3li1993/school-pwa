<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>السوبر أدمين - قمرة تحكم المنظومة الرقمية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #f1f5f9; padding: 30px; margin: 0; }
        h1 { font-weight: 900; color: #fff; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .stat-card h2 { margin: 0; font-size: 36px; font-weight: 900; }
        .stat-card p { margin: 5px 0 0; color: #cbd5e1; font-size: 14px; }
        .setup-box { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .setup-box h3 { margin-top: 0; color: #38bdf8; }
        input, select { padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; width: calc(33% - 15px); font-family: 'Cairo'; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: #94a3b8; font-weight: 700; }
        button { cursor: pointer; padding: 10px 16px; border-radius: 8px; border: none; font-weight: bold; font-family: 'Cairo'; transition: 0.2s; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <h1><i class="bi bi-cloud-check-fill"></i> مركز إدارة المنظومة السحابية (SaaS)</h1>
    
    <div id="revenue-stats" class="grid">
        <div style="background:#1e3a5f" class="stat-card"><h2>0</h2><p>المدارس المتعاقدة</p></div>
        <div style="background:#1e3a1e" class="stat-card"><h2>0</h2><p>المنصات النشطة</p></div>
        <div style="background:#2d2a1e" class="stat-card"><h2>0 KWD</h2><p>الإيراد السنوي المستهدف</p></div>
    </div>

    <div class="setup-box">
        <h3><i class="bi bi-building-add"></i> إطلاق منصة مدرسة جديدة فوراَ</h3>
        <input type="text" id="school-id" placeholder="معرف المدرسة (مثال: salim_school)">
        <input type="text" id="school-name" placeholder="اسم المدرسة المعرب (مثال: سالم الحسينان)">
        <input type="text" id="admin-id" placeholder="اسم مستخدم المدير (مثال: ADMIN1)">
        <input type="text" id="admin-name" placeholder="اسم المدير المسؤول">
        <input type="password" id="admin-pass" placeholder="كلمة المرور">
        <input type="text" id="contact-phone" placeholder="رقم هاتف المتابعة (بدون 965)">
        <select id="school-plan">
            <option value="basic">الخطة الأساسية (150 KWD)</option>
            <option value="pro" selected>الخطة الاحترافية (250 KWD)</option>
            <option value="enterprise">الخطة المتقدمة (400 KWD)</option>
        </select>
        <button onclick="window.createNewSchoolPlatformLive()" style="background:#3b82f6; color:#fff; width: 100%; margin-top: 10px; font-size: 16px;">
            <i class="bi bi-rocket-takeoff"></i> تشغيل وربط السيرفر
        </button>
    </div>

    <h3 style="color: #fff;"><i class="bi bi-table"></i> المنشآت التعليمية المرتبطة بالسيرفر</h3>
    <table>
        <thead>
            <tr>
                <th>اسم المدرسة</th>
                <th>الباقة</th>
                <th>حالة الاشتراك</th>
                <th>تاريخ الانتهاء والمهلة</th>
                <th>إجراءات تجارية</th>
            </tr>
        </thead>
        <tbody id="schools-table-body">
            <tr><td colspan="5" style="text-align: center;">جاري تحميل البيانات...</td></tr>
        </tbody>
    </table>

    <script type="module">
        import { db, app } from './js/firebase-config.js';
        import { collection, doc, setDoc, addDoc, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const auth = getAuth(app);

        // إنشاء منصة مدرسة جديدة
        window.createNewSchoolPlatformLive = async () => {
            const schoolId = document.getElementById('school-id').value.trim();
            const schoolName = document.getElementById('school-name').value.trim();
            const adminId = document.getElementById('admin-id').value.trim();
            const adminName = document.getElementById('admin-name').value.trim();
            const adminPass = document.getElementById('admin-pass').value.trim();
            const contactPhone = document.getElementById('contact-phone').value.trim();
            const selectedPlan = document.getElementById('school-plan').value;

            if(!schoolId || !schoolName || !adminId || !adminPass) return alert("يرجى ملء جميع الحقول المطلوبة!");

            const oneYearLater = new Date();
            oneYearLater.setFullYear(oneYearLater.getFullYear() + 1);
            const subscriptionEndISO = oneYearLater.toISOString().slice(0,10);

            const virtualEmail = `${adminId}@${schoolId}.hosainan.edu`;

            try {
                const cred = await createUserWithEmailAndPassword(auth, virtualEmail, adminPass);
                await setDoc(doc(db, 'users', cred.user.uid), {
                    schoolId: schoolId, userId: adminId, name: adminName, role: 'admin',
                    plainPass: adminPass, email: virtualEmail, authMigrated: true, createdAt: serverTimestamp()
                });
            } catch(authErr) {
                console.warn('Auth fallback triggered:', authErr.message);
                await addDoc(collection(db, 'users'), {
                    schoolId: schoolId, userId: adminId, name: adminName, role: 'admin',
                    plainPass: adminPass, createdAt: serverTimestamp()
                });
            }

            await setDoc(doc(db, 'schools', schoolId), {
                name: schoolName, status: 'active', plan: selectedPlan,
                subscriptionEnd: subscriptionEndISO, contactPhone: contactPhone, createdAt: serverTimestamp()
            });

            alert(`✅ تم إطلاق منصة مدرسة ${schoolName} وتأمين حساب المسؤول بنجاح!`);
        };

        // محرك رسائل الواتساب الذكي لتذكير التجديد
        window.sendRenewalWhatsApp = (schoolName, daysLeft, phone) => {
            const emoji = daysLeft < 0 ? '🚨' : daysLeft <= 7 ? '⚠️' : '⚡';
            const msg = `${emoji} إشعار اشتراك مدرسة: *${schoolName}*\n\n` +
                        (daysLeft < 0 ? `لقد انتهى الاشتراك السنوي للمنظومة منذ ${Math.abs(daysLeft)} يوم، وتم إيقاف الخدمة مؤقتاً ❌` : `نحيطكم علماً بأن الاشتراك السنوي للمنظومة ينتهي خلال ${daysLeft} يوم.`) +
                        `\n\nلضمان استمرارية الخدمة وتأمين بيانات المنشأة، يرجى التواصل لتجديد الاشتراك 📱\n\n_المنظومة الرقمية الشاملة_`;
            
            const url = phone ? `https://wa.me/965${phone}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        };

        // جلب الإحصائيات وجدول المدارس لايف
        onSnapshot(collection(db, 'schools'), snapshot => {
            let activeCount = 0, totalRevenue = 0;
            const tableBody = document.getElementById('schools-table-body');
            tableBody.innerHTML = '';

            snapshot.forEach(docSnap => {
                const d = docSnap.data();
                const id = docSnap.id;
                
                if(d.status === 'active') {
                    activeCount++;
                    const prices = { basic: 150, pro: 250, enterprise: 400 };
                    totalRevenue += prices[d.plan || 'basic'] || 250;
                }

                const end = d.subscriptionEnd || 'غير محدد';
                const daysLeft = d.subscriptionEnd ? Math.ceil((new Date(d.subscriptionEnd) - new Date()) / 864e5) : null;
                const endColor = daysLeft < 0 ? '#ef4444' : daysLeft <= 30 ? '#f59e0b' : '#4ade80';

                tableBody.innerHTML += `<tr>
                    <td style="color: #fff;"><b>${d.name}</b></td>
                    <td><span style="background: #334155; padding: 4px 8px; border-radius: 4px; font-size: 12px; text-transform: uppercase;">${d.plan || 'pro'}</span></td>
                    <td style="color:${d.status === 'active' ? '#4ade80' : '#ef4444'}; font-weight: bold;">${d.status === 'active' ? 'نشط' : 'موقوف'}</td>
                    <td style="color:${endColor}; font-weight:700;">
                        ${end} ${daysLeft !== null ? `(${daysLeft > 0 ? daysLeft + ' يوم متبقي' : 'منتهي بقفل آلي!'})` : ''}
                    </td>
                    <td>
                        <button onclick="window.sendRenewalWhatsApp('${d.name}', ${daysLeft}, '${d.contactPhone || ''}')" style="background:#25d366; color:#fff;">
                            <i class="bi bi-whatsapp"></i> إرسال إنذار تجديد
                        </button>
                    </td>
                </tr>`;
            });

            document.getElementById('revenue-stats').innerHTML = `
                <div style="background:#1e3a5f" class="stat-card"><h2>${snapshot.size}</h2><p>المدارس المتعاقدة</p></div>
                <div style="background:#1e3a1e" class="stat-card"><h2>${activeCount}</h2><p>المنصات النشطة</p></div>
                <div style="background:#2d2a1e" class="stat-card"><h2 style="color: #fbbf24;">${totalRevenue} KWD</h2><p>الإيراد السنوي المستهدف</p></div>
            `;
        });
    </script>
</body>
</html>
