<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link class="apple-touch-icon" href="./logo.png">
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<title>إعداد النظام المركزي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:  #0b2545;
  --sky:   #1a78c2;
  --ice:   #eaf4fd;
  --gold:  #d4920a;
  --white: #ffffff;
  --off:   #f8f9fc;
  --line:  #e5e7eb;
  --text:  #111827;
  --mid:   #6b7280;
  --green: #059669;
  --red:   #dc2626;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background: var(--off);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px;width:100%;max-width:400px}
h1{font-size:20px;font-weight:800;margin-bottom:6px}
p{font-size:13px;color:#94a3b8;margin-bottom:24px}
.field{margin-bottom:14px}
label{font-size:12px;color:#94a3b8;display:block;margin-bottom:5px;font-weight:700}
input{width:100%;padding:11px 14px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;color:white;font-family:'Tajawal',sans-serif;font-size:14px;outline:none}
input:focus{border-color:var(--gold)}
button{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),#d35400);border:none;border-radius:12px;color:white;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px}
.msg{padding:12px;border-radius:10px;font-size:13px;font-weight:700;margin-top:14px;display:none;text-align:center}
.msg.ok{background:rgba(5,150,105,.15);border:1px solid rgba(5,150,105,.3);color:#6ee7b7;display:block}
.msg.err{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#fca5a5;display:block}
.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:12px;font-size:12px;color:#fcd34d;margin-bottom:20px}
</style>
</head>
<body>
<div class="card">
  <h1>⚙️ إعداد المنشأة والمدير</h1>
  <p>تهيئة المنظومة وإنشاء حساب الإدارة الأول (M-SaaS)</p>
  
  <div class="warn">⚠️ هذه الصفحة للإعداد الأولي للمنشأة — يرجى تأمين الرابط أو حذفه من السيرفر فور الانتهاء.</div>

  <div class="field">
    <label>🏢 كود تفعيل المنشأة الموحد (School ID)</label>
    <input type="text" id="schoolId" placeholder="مثال: hosainan" value="hosainan">
  </div>
  <div class="field">
    <label>رقم المستخدم (User ID تسجيل الدخول)</label>
    <input type="text" id="userId" placeholder="مثال: 6464" value="6464">
  </div>
  <div class="field">
    <label>اسم المدير / رئيس القسم</label>
    <input type="text" id="name" placeholder="الاسم الكامل" value="حسين">
  </div>
  <div class="field">
    <label>كلمة المرور السرية (Password)</label>
    <input type="text" id="pass" placeholder="كلمة المرور" value="310310">
  </div>

  <button id="createBtn">✅ تفعيل المنشأة وإنشاء الحساب</button>
  <div id="msg" class="msg"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyDEA77qGfSK7w5rYynyzP9-mvD13rRT0tU",
  authDomain: "hosainan-school.firebaseapp.com",
  projectId: "hosainan-school",
  storageBucket: "hosainan-school.firebasestorage.app",
  messagingSenderId: "264264994076",
  appId: "1:264264994076:web:1a87730b7d3c684bdf3ed9"
});
const auth = getAuth(app);
const db = getFirestore(app);

async function createAdmin(){
  const schoolId = document.getElementById('schoolId').value.trim().toLowerCase();
  const userId = document.getElementById('userId').value.trim();
  const name = document.getElementById('name').value.trim();
  const pass = document.getElementById('pass').value.trim();
  const msg = document.getElementById('msg');
  
  if(!schoolId || !userId || !name || !pass){
    msg.className='msg err'; msg.textContent='يرجى ملء جميع الحقول المطلوبة بالكامل.'; return;
  }

  if(pass.length < 6) {
    msg.className='msg err'; msg.textContent='⚠️ أمان الفايربيس يتطلب كلمة مرور لا تقل عن 6 خانات.'; return;
  }

  msg.className='msg ok';
  msg.textContent='⏳ جاري بث وثيقة الأمان وتفعيل السيرفر...';

  try{
    // 1. توليد إيميل افتراضي مشفر مبني على كود المدرسة لضمان فرادة الحسابات
    const email = `${userId}@${schoolId}.edu`;
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    
    // 2. حقن مستند الصلاحيات المطور للمدير وربطه بـ schoolId
    await setDoc(doc(db, 'users', cred.user.uid), {
      userId: userId, 
      name: name, 
      role: 'admin', 
      email: email,
      schoolId: schoolId,      // 🔑 الربط البنائي للـ SaaS
      authMigrated: true,      // 🔒 تفعيل بروتوكول التشفير الفوري لصفحة الدخول
      createdAt: new Date().toISOString(),
      classId: ''
    });

    // 3. تهيئة وتفعيل رخصة المدرسة تلقائياً في السيرفر لضمان عبور بوابة تسجيل الدخول
    await setDoc(doc(db, 'schools', schoolId), {
      name: "مدرسة مدرسة سالم الحسينان المتوسطة", 
      status: "active",
      subscriptionEnd: "2028-12-31" // صلاحية الترخيص التلقائي الافتراضي
    }, { merge: true });

    msg.className='msg ok';
    msg.textContent='✅ تم تفعيل المنشأة وإنشاء حساب المدير بنجاح الحين! جاري التوجيه لبوابة الدخول...';
    
    setTimeout(function(){ window.location.replace('index.html'); }, 3000);
  }catch(e){
    msg.className='msg err';
    if(e.code==='auth/email-already-in-use'){
      msg.textContent='❌ هذا المعرف مسجّل بالفعل لنفس هذه المدرسة!';
    } else {
      msg.textContent='خطأ أثناء التفعيل: '+e.message;
    }
  }
};
document.getElementById('createBtn').addEventListener('click', createAdmin);
</script>
</body>
</html>
