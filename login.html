<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link class="apple-touch-icon" href="./logo.png">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <title>تسجيل الدخول - المنظومة الرقمية الشاملة</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
:root {
  --navy:  #0b2545;
  --sky:   #1a78c2;
  --ice:   #eaf4fd;
  --gold:  #d4920a;
  --white: #ffffff;
  --off:   #f8f9fc;
  --line:  #e5e7eb;
  --text:  #111827;
  --mid:   #6b7280;
  --green: #059669;
  --red:   #dc2626;
}

    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: var(--off); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    
    .login-container { background: #fff; width: 100%; max-width: 420px; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.08); border-top: 6px solid var(--navy); text-align: center; }
    .logo-box { font-size: 50px; color: var(--navy); margin-bottom: 10px; }
    .login-container h2 { color: var(--navy); font-size: 22px; font-weight: 700; margin-bottom: 5px; }
    .login-container p { color: #666; font-size: 13px; margin-bottom: 2rem; }
    
    .input-group { position: relative; margin-bottom: 1.2rem; text-align: right; }
    .input-group label { display: block; font-size: 13px; font-weight: bold; color: var(--navy); margin-bottom: 6px; }
    .input-group input { width: 100%; padding: 12px 40px 12px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: #fdfdfd; transition: border 0.2s; }
    .input-group input:focus { border-color: var(--gold); outline: none; background: #fff; }
    .input-group i { position: absolute; right: 12px; bottom: 12px; color: #aaa; font-size: 18px; }
    
    .btn-login { width: 100%; background: var(--navy); color: #fff; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; margin-top: 1rem; }
    .btn-login:hover { background: #2a2a3e; }
    .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }
    
    .back-home { display: inline-block; margin-top: 1.5rem; color: var(--gold); text-decoration: none; font-size: 13px; font-weight: bold; }
    .back-home:hover { text-decoration: underline; }
    
    .error-msg { color: #e74c3c; font-size: 13px; font-weight: bold; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-box"><i class="bi bi-person-badge-fill"></i></div>
    <h2>بوابة تسجيل الدخول</h2>
    <p>المنظومة الرقمية الشاملة - منصة الـ M-SaaS الموحدة</p>
    
    <div id="login-error" class="error-msg">❌ رقم المستخدم أو كلمة المرور غير صحيحة!</div>
    
    <form id="login-form" onsubmit="window.handleLogin(event)">
      <div class="input-group">
        <label>رقم المستخدم</label>
        <input type="text" id="user-id" placeholder="أدخل رقم المستخدم الخاص بك" required>
        <i class="bi bi-hash"></i>
      </div>
      
      <div class="input-group">
        <label>كلمة المرور</label>
        <input type="password" id="user-pass" placeholder="أدخل كلمة المرور" required>
        <i class="bi bi-lock"></i>
      </div>
      
      <button type="submit" class="btn-login" id="submit-btn">دخول للمنظومة</button>
    </form>
    
    <a href="index.html" class="back-home">← العودة للصفحة الرئيسية</a>
  </div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, collection, getDocs, query, where, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js'; // 🔑 استدعاء محرك التشفير المعتمد

  const firebaseConfig = {
    apiKey: "AIzaSyDEA77qGfSK7w5rYynyzP9-mvD13rRT0tU",
    authDomain: "hosainan-school.firebaseapp.com",
    projectId: "hosainan-school",
    storageBucket: "hosainan-school.firebasestorage.app",
    messagingSenderId: "264264994076",
    appId: "1:264264994076:web:1a87730b7d3c684bdf3ed9",
    measurementId: "G-FG9NLDJZQN"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app); // تشغيل جدار حماية الهويات

  window.handleLogin = async function(event) {
    event.preventDefault();
    const userId = document.getElementById('user-id').value.trim();
    const userPass = document.getElementById('user-pass').value;
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('submit-btn');
    
    errorEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'جاري فحص الترخيص والأمان...';
    
    try {
      // 1. جلب بيانات الحساب الأساسية للتحقق من انتماء المدرسة وإيميل التشفير
      const q = query(collection(db, 'users'), where('userId', '==', userId));
      const snap = await getDocs(q);
      
      if (snap.empty) {
        showError("❌ رقم المستخدم غير مقيد بالمنظومة المركزية.");
        return;
      }

      const userData = snap.docs[0].data();
      const schoolId = userData.schoolId;

      if (!schoolId) {
        showError("❌ خطأ حرج: الحساب غير مربوط بأي منشأة تعليمية.");
        return;
      }

      // 2. 🚨 جدار فحص اشتراك المنشأة التعليمية (SaaS Subscription Check)
      const schoolDoc = await getDoc(doc(db, 'schools', schoolId));
      if (schoolDoc.exists()) {
        const schoolData = schoolDoc.data();

        // أ) التحقق من الإيقاف اليدوي بوعلي
        if (schoolData.status === 'suspended') {
          showError("⚠️ تم إيقاف اشتراك المدرسة مؤقتاً.\nيرجى مراجعة إدارة الدعم الفني لإعادة التفعيل.");
          return;
        }

        // ب) التحقق التلقائي من الصلاحية السنوية للترخيص
        if (schoolData.subscriptionEnd) {
          const expireDate = new Date(schoolData.subscriptionEnd);
          if (expireDate < new Date()) {
            showError(`⚠️ انتهى ترخيص بث المنشأة تلقائياً بتاريخ: [ ${schoolData.subscriptionEnd} ]`);
            return;
          }
        }
      }

      // 3. 🔒 فحص الأمان الهجين (تحقق مشفر بالكامل أو تقليدي لحين النقل التام)
      let isPasswordCorrect = false;

      if (userData.authMigrated === true) {
        try {
          // الحساب تم ترحيله وتأمينه داخل الـ Auth بنجاح
          await signInWithEmailAndPassword(auth, userData.email, userPass);
          isPasswordCorrect = true;
        } catch (authErr) {
          showError("❌ كلمة المرور المشفرة غير صحيحة.");
          return;
        }
      } else {
        // الحساب في وضع الترحيل المعلق (Legacy Mode) - فحص تقليدي مؤقت
        if (userData.plainPass === userPass) {
          isPasswordCorrect = true;
        } else {
          showError("❌ كلمة المرور المؤقتة غير صحيحة.");
          return;
        }
      }

      // 4. ✅ الترخيص وكلمة المرور تطابقوا! تخزين الجلسة محلياً والتحويل حسب التخصص
      if (isPasswordCorrect) {
        localStorage.setItem('hs_user', JSON.stringify({
          userId: userData.userId,
          name: userData.name || "عضو المنظومة",
          role: String(userData.role || '').trim().toLowerCase(),
          schoolId: schoolId,
          classId: userData.classId || ''
        }));

        // 5. التوجيه الذكي للموظف حسب الصفحة المتواجدة بالسيستم عندك
        const role = String(userData.role || '').trim().toLowerCase();
        
        if (role === 'teacher') {
          window.location.replace('teacher.html'); // بوابة المعلمين لرصد الحصص
        } else if (role === 'guard') {
          window.location.replace('guard.html'); // بوابة حارس الأمن والزوار لايف
        } else if (role === 'social_worker') {
          window.location.replace('social.html'); // بوابة الأخصائي للبطاقات والاستئذان
        } else {
          window.location.replace('dashboard.html'); // لوحة التحكم والمركز الرئيسي الموحد
        }
      }

    } catch (err) {
      alert('خطأ في الاتصال بالخادم السحابي: ' + err.message);
      resetBtn();
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      resetBtn();
    }

    function resetBtn() {
      btn.disabled = false;
      btn.textContent = 'دخول للمنظومة';
    }
  }
</script>
</body>
</html>
