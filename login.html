<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - المنظومة الرقمية الشاملة</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    
    .login-container { background: #fff; width: 100%; max-width: 420px; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.08); border-top: 6px solid #1a1a2e; text-align: center; }
    .logo-box { font-size: 50px; color: #1a1a2e; margin-bottom: 10px; }
    .login-container h2 { color: #1a1a2e; font-size: 22px; font-weight: 700; margin-bottom: 5px; }
    .login-container p { color: #666; font-size: 13px; margin-bottom: 2rem; }
    
    .input-group { position: relative; margin-bottom: 1.2rem; text-align: right; }
    .input-group label { display: block; font-size: 13px; font-weight: bold; color: #1a1a2e; margin-bottom: 6px; }
    .input-group input { width: 100%; padding: 12px 40px 12px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: #fdfdfd; transition: border 0.2s; }
    .input-group input:focus { border-color: #e67e22; outline: none; background: #fff; }
    .input-group i { position: absolute; right: 12px; bottom: 12px; color: #aaa; font-size: 18px; }
    
    .btn-login { width: 100%; background: #1a1a2e; color: #fff; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; margin-top: 1rem; }
    .btn-login:hover { background: #2a2a3e; }
    
    .back-home { display: inline-block; margin-top: 1.5rem; color: #e67e22; text-decoration: none; font-size: 13px; font-weight: bold; }
    .back-home:hover { text-decoration: underline; }
    
    .error-msg { color: #e74c3c; font-size: 13px; font-weight: bold; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-box"><i class="bi bi-person-badge-fill"></i></div>
    <h2>بوابة تسجيل الدخول</h2>
    <p>المنظومة الرقمية الشاملة - مدرسة سالم الحسينان</p>
    
    <div id="login-error" class="error-msg">❌ رقم المستخدم أو كلمة المرور غير صحيحة!</div>
    
    <!-- نموذج الدخول -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>رقم المستخدم</label>
        <input type="text" id="user-id" placeholder="أدخل رقم المستخدم الخاص بك" required>
        <i class="bi bi-hash"></i>
      </div>
      
      <div class="input-group">
        <label>كلمة المرور</label>
        <input type="password" id="user-pass" placeholder="أدخل كلمة المرور" required>
        <i class="bi bi-lock"></i>
      </div>
      
      <button type="submit" class="btn-login" id="submit-btn">دخول للمنظومة</button>
    </form>
    
    <a href="index.html" class="back-home">← العودة للصفحة الرئيسية</a>
  </div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  // الإعدادات الرسمية لقواعد البيانات الخاصة بمشروعك
  const firebaseConfig = {
    apiKey: "AIzaSyDEA77qGfSK7w5rYynyzP9-mvD13rRT0tU",
    authDomain: "hosainan-school.firebaseapp.com",
    projectId: "hosainan-school",
    storageBucket: "hosainan-school.firebasestorage.app",
    messagingSenderId: "264264994076",
    appId: "1:264264994076:web:1a87730b7d3c684bdf3ed9",
    measurementId: "G-FG9NLDJZQN"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.handleLogin = async function(event) {
    event.preventDefault();
    const userId = document.getElementById('user-id').value.trim();
    const userPass = document.getElementById('user-pass').value;
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('submit-btn');
    
    errorEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'جاري التحقق والمزامنة...';
    
    try {
      // الاستعلام للتأكد من رقم السجل والباسورد حياً من قواعد الفيربيز
      const q = query(collection(db, 'users'), where('userId', '==', userId), where('plainPass', '==', userPass));
      const snap = await getDocs(q);
      
      if (!snap.empty) {
        const userData = snap.docs[0].data();
        // حفظ جلسة المستخدم محلياً في المتصفح والدخول الفوري لـ admin.html
        localStorage.setItem('hs_user', JSON.stringify(userData));
        window.location.href = 'admin.html';
      } else {
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'دخول للمنظومة';
      }
    } catch (err) {
      alert('خطأ في الاتصال بالخادم السحابي: ' + err.message);
      btn.disabled = false;
      btn.textContent = 'دخول للمنظومة';
    }
  }
</script>
</body>
</html>
