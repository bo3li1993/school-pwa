<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة المعلم الرقمية - مدرسة سالم الحسينان المتوسطة للبنين</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
:root { --primary-color: #1a1a2e; --accent-color: #e67e22; --bg-light: #f5f6fa; }
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Cairo', sans-serif; }
body { background: var(--bg-light); color:#333; padding:15px; }
.container { max-width:800px; margin:0 auto; }
.card { background:#fff; border-radius:12px; padding:20px; margin-bottom:15px; box-shadow:0 4px 6px rgba(0,0,0,0.02); border-top:5px solid var(--primary-color); text-align:right; }
button { background:var(--primary-color); color:#fff; border:none; padding:12px 20px; border-radius:6px; cursor:pointer; width:100%; font-size:14px; font-weight:700; }
button:hover { background:var(--accent-color); }
select { width:100%; padding:11px; border:1px solid #ddd; border-radius:6px; margin-bottom:12px; font-weight:600; text-align:right; outline:none; }
.student-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #eee; }
.header { background:var(--primary-color); color:#fff; padding:15px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:4px solid var(--accent-color); }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h3 style="font-weight:900;">بوابة المعلم: أ. <span id="teacher-name-display">جاري التحميل...</span></h3>
            <p style="font-size:11px; opacity:0.8; font-weight:bold;">المنظومة الموحدة لرصد الغياب اليومي وحصر الحصص</p>
        </div>
        <button onclick="localStorage.clear(); window.location.href='index.html';" style="width:auto; padding:6px 14px; background:transparent; border:1px solid #fff; font-size:12px; border-radius:4px;">خروج آمن</button>
    </div>

    <div class="card">
        <h2><i class="bi bi-calendar-check-fill" style="color:var(--accent-color);"></i> رصد غياب وفروق الحصص للفصل الدراسي</h2>
        <p style="font-size:12px; color:#666; margin-bottom:15px; font-weight:bold;">اختر الفصل الدراسي الموكل إليك رصده؛ سيقوم المحرك بترتيب كشف الأسماء أبجدياً تلقائياً لراحة الرصد بالموبايل.</p>
        
        <label style="font-weight:700; font-size:13px; display:block; margin-bottom:4px;">اختر الفصل الدراسي</label>
        <select id="teacher-class-select" onchange="window.loadClassStudentsForTeacher(this.value)">
            <option value="">-- اختر الفصل الدراسي المعتمد --</option>
            <option value="6/1">6/1</option><option value="6/2">6/2</option><option value="6/3">6/3</option><option value="6/4">6/4</option>
            <option value="7/1">7/1</option><option value="7/2">7/2</option><option value="7/3">7/3</option><option value="7/4">7/4</option>
            <option value="8/1">8/1</option><option value="8/2">8/2</option><option value="8/3">8/3</option><option value="8/4">8/4</option>
            <option value="9/1">9/1</option><option value="9/2">9/2</option>
        </select>
        
        <div id="students-attendance-list-area" style="margin-top:15px;"></div>
        <button id="submit-attendance-btn" onclick="window.submitAttendanceLiveFromTeacher()" style="display:none; margin-top:15px; background:var(--accent-color);"><i class="bi bi-cloud-upload-fill"></i> اعتماد ورفع سجل الحضور والغياب للداشبورد</button>
    </div>
</div>

<script type="module">
import { db } from './js/firebase-config.js';
import { collection, getDocs, addDoc, query, where, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

let teacherName = "";

// 🔒 1. فحص الحماية والجلسة الصارم للمعلم لتقييد الصلاحيات وحماية المنظومة من التداخل
try {
    const saved = localStorage.getItem('hs_user');
    if(!saved) { window.location.href = 'index.html'; }
    const u = JSON.parse(saved);
    if(u.role !== 'teacher') { window.location.replace('admin.html'); }
    teacherName = u.name || "عضو هيئة التعليم";
    document.getElementById('teacher-name-display').textContent = teacherName;
} catch(e) { window.location.href = 'index.html'; }

window.loadClassStudentsForTeacher = async function(classId) {
    const listArea = document.getElementById('students-attendance-list-area');
    const submitBtn = document.getElementById('submit-attendance-btn');
    if(!classId) { listArea.innerHTML = ""; submitBtn.style.display = 'none'; return; }
    
    listArea.innerHTML = "<p style='text-align:center; padding:15px; font-weight:bold;'>⏳ جاري استدعاء كشف طلاب الفصل وفرزهم أبجدياً كويتيّاً...</p>";
    submitBtn.style.display = 'none';

    try {
        const q = query(collection(db, 'students'), where('classId', '==', classId.trim()));
        const snap = await getDocs(q);
        let arr = [];
        snap.forEach(doc => { if(doc.data().name) arr.push(doc.data().name.trim()); });
        
        // 🔤 ترتيب أسماء الطلاب أبجدياً من الألف للياء لسهولة التعامل من تليفون المعلم
        arr.sort((a,b) => a.localeCompare(b, 'ar'));

        if(arr.length === 0) {
            listArea.innerHTML = "<p style='text-align:center; color:var(--danger-color); font-weight:bold;'>⚠️ لا يوجد طلاب مقيدين بهذا الفصل بالسيرفر حالياً.</p>";
            return;
        }

        let html = '<h4 style="margin-bottom:10px; color:var(--primary-color); border-bottom:2px solid #eee; padding-bottom:5px;">قائمة رصد الحضور والغياب:</h4>';
        arr.forEach((name) => {
            html += `
            <div class="student-row">
                <span style="font-weight:700; font-size:14px;">👤 ${name}</span>
                <select class="attendance-status-input" data-name="${name}" style="width:120px; margin-bottom:0; padding:5px; font-size:13px; font-weight:bold;">
                    <option value="present">🟢 حضور</option>
                    <option value="absent">🔴 غياب</option>
                </select>
            </div>`;
        });
        listArea.innerHTML = html;
        submitBtn.style.display = 'block';
    } catch(e) {
        listArea.innerHTML = `<div style="color:red; font-weight:bold; text-align:center; padding:10px;">❌ تعذر جلب السجل: ${e.message}</div>`;
    }
};

window.submitAttendanceLiveFromTeacher = async function() {
    const classId = document.getElementById('teacher-class-select').value;
    const rows = document.querySelectorAll('.attendance-status-input');
    if(!classId || rows.length === 0) return;

    // 📅 توحيد التاريخ بصيغة كود الكويت الصارمة لضمان قراءته في داشبورد الأدمين بشكل صحيح
    const kwDate = new Date().toLocaleDateString('ar-KW');
    alert('⏳ جاري إرسال ورفع كشف الرصد الرقمي لايف للداشبورد الرئيسي...');

    try {
        let promises = [];
        rows.forEach(row => {
            const name = row.getAttribute('data-name');
            const status = row.value;
            
            // رفع وحقن البيانات بالكولكشن مع تدوين المعلم المسؤول عن الرصد آلياً لحفظ السجلات
            promises.push(addDoc(collection(db, 'attendance'), {
                studentName: name,
                name: name,
                classId: classId,
                status: status,
                date: kwDate,           // صيغة التاريخ الموحدة ar-KW
                recordedBy: teacherName, // توثيق المعلم الراصد
                timestamp: serverTimestamp()
            }));
        });
        await Promise.all(promises);
        alert('✓ تم رصد واعتماد غياب وحضور الفصل بنجاح، ورفع الداتا لغرفة التحكم.');
        document.getElementById('teacher-class-select').value = "";
        document.getElementById('students-attendance-list-area').innerHTML = "";
        document.getElementById('submit-attendance-btn').style.display = 'none';
    } catch(e) { alert('❌ خطأ حرج أثناء رفع البيانات: ' + e.message); }
};
</script>
</body>
</html>
