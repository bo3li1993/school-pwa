<title>بوابة الهيئة التعليمية - المنظومة السحابية</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght=400;600;700;900&display=swap');
:root {
    --primary-color: #1a1a2e; --hover-color: #e67e22; --bg-light: #f4f6f9;
    --success-color: #27ae60; --danger-color: #e74c3c; --warning-color: #f39c12;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
body { background: var(--bg-light); display: flex; flex-direction: column; min-height: 100vh; direction: rtl; }

.header-nav { background: var(--primary-color); color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--hover-color); }
.header-nav h1 { font-size: 15px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
.header-nav p { font-size: 11px; opacity: 0.8; }

.workspace-container { max-width: 1200px; width: 100%; margin: 15px auto; padding: 0 12px; flex: 1; }

.manager-alert-box { background: #fff3cd; border: 2px solid #ffeeba; color: #856404; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; align-items: flex-start; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }

.tabs-switcher { display: flex; gap: 8px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
.tab-btn { background: #fff; border: 1px solid #cbd5e1; padding: 14px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; color: #4a5568; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.tab-btn.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

.tab-content { display: none; }
.tab-content.active { display: block; }

.card { background: #fff; border-radius: 14px; padding: 22px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eef2f5; }
.card h2 { font-size: 14px; font-weight: 900; color: var(--primary-color); margin-bottom: 15px; display: flex; align-items: center; gap: 6px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }

.periods-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 12px 0 5px 0; }
.period-badge { background: #e2e8f0; color: #475569; text-align: center; padding: 8px 4px; border-radius: 8px; font-size: 11px; font-weight: bold; border: 1px solid #cbd5e1; transition: 0.3s; }
.period-badge.done { background: #e8f8f5; color: var(--success-color); border-color: #a3e635; }

input, select, textarea { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 12px; outline: none; font-weight: 700; font-size: 14px; color: var(--primary-color); text-align: right; background: #fff; }
input:focus, select:focus, textarea:focus { border-color: var(--hover-color); }

.btn-main-submit { width: 100%; background: var(--primary-color); color: #fff; border: none; padding: 16px; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 14px; transition: 0.2s; box-shadow: 0 4px 12px rgba(26,26,46,0.15); }
.btn-main-submit:hover { background: var(--hover-color); }

.student-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }
.student-name { font-size: 14px; font-weight: 700; color: #334155; flex: 1; text-align: right; }

.attendance-options { display: flex; gap: 4px; }
.option-label { cursor: pointer; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; transition: 0.2s; display: inline-flex; align-items: center; gap: 4px; }
.option-label input { display: none; }

.option-label.p-active { background: #e8f8f5; color: var(--success-color); border-color: #2cc71a; box-shadow: 0 2px 5px rgba(39,174,96,0.15); }
.option-label.a-active { background: #fde8e8; color: var(--danger-color); border-color: #f05252; box-shadow: 0 2px 5px rgba(231,76,60,0.15); }
.option-label.l-active { background: #fef3c7; color: #d97706; border-color: #f59e0b; box-shadow: 0 2px 5px rgba(243,156,18,0.15); }

table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: right; margin-top: 10px; }
th, td { padding: 12px 10px; border: 1px solid #e2e8f0; font-weight: 700; }
th { background: #f1f5f9; color: var(--primary-color); font-weight: 900; }
</style>
</head>
<body>

<div class="header-nav">
    <div>
        <h1 id="lbl-teacher-header"><i class="bi bi-person-workspace"></i> بوابة الهيئة التعليمية الإلكترونية</h1>
        <p>المنظومة الرقمية المركزية لإدارة المنشآت التعليمية الموحدة</p>
