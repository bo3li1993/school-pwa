<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="./logo.png">
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<title>بوابة مدرسة سالم الحسينان المتوسطة للبنين</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root { --primary: #1a1a2e; --accent: #e67e22; --bg: #f8fafc; }
* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
body { background: var(--bg); color: #334155; }

.hero-section { background: linear-gradient(135deg, var(--primary) 0%, #111122 100%); color: #fff; padding: 60px 20px; text-align: center; border-bottom: 6px solid var(--accent); }
.hero-section h1 { font-size: 26px; font-weight: 900; }
.hero-section p { font-size: 14px; color: #cbd5e1; margin-top: 5px; }

.nav-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color:#fff; padding: 10px 24px; border-radius: 30px; text-decoration: none; font-weight: 700; margin-top: 20px; font-size: 14px; transition: 0.2s; }
.nav-btn:hover { background: #d35400; transform: translateY(-2px); }

.container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
.announcement-box { background: #fff3cd; border-right: 6px solid #ffc107; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-weight: bold; font-size: 14px; color: #856404; display: none; }

.card { background: #fff; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
.card h3 { font-size: 16px; font-weight: 900; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }

.dynamic-img { width: 100%; max-height: 350px; object-fit: cover; border-radius: 8px; display: none; margin-top: 10px; }

table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
th, td { padding: 12px; text-align: right; border-bottom: 1px solid #cbd5e1; }
th { background: #f1f5f9; font-weight: 700; color: var(--primary); }
</style>
</head>
<body>

<div class="hero-section">
    <img src="./logo.png" alt="شعار المدرسة" style="height: 80px; margin-bottom: 10px;">
    <h1>مدرسة سالم الحسينان المتوسطة للبنين</h1>
    <p>المنظومة الرقمية الشاملة والإدارة الذكية للتعليم</p>
    <a href="index.html" class="nav-btn"><i class="bi bi-box-arrow-in-right"></i> الدخول إلى لوحة التحكم الموحدة</a>
</div>

<div class="container">
    <!-- كرت الإعلانات الهامة -->
    <div class="announcement-box" id="parent-notice-area"></div>

    <!-- كرت عرض صور الفعاليات -->
    <div class="card" id="card-photo-area" style="display:none;">
        <h3><i class="bi bi-images" style="color:var(--accent);"></i> صور وفعاليات المدرسة الحالية</h3>
        <img id="landing-live-img" class="dynamic-img" src="" alt="فعاليات المدرسة">
    </div>

    <!-- كرت الجداول والتعاميم المرصودة من المدير -->
    <div class="card" id="card-table-area" style="display:none;">
        <h3><i class="bi bi-table" style="color:#2980b9;"></i> جداول وتعاميم الإدارة الحالية</h3>
        <div id="landing-table-container"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { db } from './js/firebase-config.js';

// الاستماع اللحظي لتعديلات المدير وعرضها فوراً بدون إنعاش الصفحة
onSnapshot(doc(db, 'system_config', 'public_landing'), (docSnap) => {
    if(docSnap.exists()) {
        const data = docSnap.data();
        
        // 1. عرض الإعلانات الهامة
        const noticeBox = document.getElementById('parent-notice-area');
        if(data.notice && data.notice.trim() !== "") {
            noticeBox.innerHTML = `<i class="bi bi-megaphone-fill"></i> إعلان هام: ${data.notice}`;
            noticeBox.style.display = 'block';
        } else { noticeBox.style.display = 'none'; }

        // 2. عرض الصور والفعاليات
        const photoCard = document.getElementById('card-photo-area');
        const liveImg = document.getElementById('landing-live-img');
        if(data.imageUrl && data.imageUrl.trim() !== "") {
            liveImg.src = data.imageUrl;
            liveImg.style.display = 'block';
            photoCard.style.display = 'block';
        } else { photoCard.style.display = 'none'; }

        // 3. عرض الجداول والتعاميم المبرمجة
        const tableCard = document.getElementById('card-table-area');
        const tableContainer = document.getElementById('landing-table-container');
        if(data.tableHtml && data.tableHtml.trim() !== "") {
            tableContainer.innerHTML = data.tableHtml;
            tableCard.style.display = 'block';
        } else { tableCard.style.display = 'none'; }
    }
});
</script>
</body>
</html>
