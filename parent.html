<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link lang="manifest" href="manifest.json">
<title>بوابة ولي الأمر الإلكترونية - مدرسة سالم الحسينان</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root { 
    --primary-color: #2c3e50; --accent-color: #2980b9; 
    --success-color: #27ae60; --danger-color: #e74c3c; --bg-light: #f4f6f9; 
}
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Cairo', sans-serif; }
body { background: var(--bg-light); color: #333; padding: 15px; }
.card { background:#fff; border-radius:12px; padding:20px; margin-bottom:15px; box-shadow:0 4px 8px rgba(0,0,0,0.02); border-top:5px solid var(--accent-color); text-align:right; }
h2 { font-size:16px; font-weight:800; color:var(--primary-color); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
input, select, textarea { width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; margin-bottom:12px; font-weight:600; text-align:right; outline:none; }
button { background:var(--primary-color); color:#fff; border:none; padding:12px; border-radius:8px; font-weight:700; cursor:pointer; width:100%; transition:all 0.2s; }
button:hover { background:var(--accent-color); }
.hidden { display:none!important; }
.badge { display:inline-block; padding:3px 8px; border-radius:12px; font-size:11px; font-weight:700; color:#fff; }
.badge.danger { background:var(--danger-color); }
.badge.success { background:var(--success-color); }
.chat-box { max-height:220px; overflow-y:auto; border:1px solid #eee; padding:10px; border-radius:8px; background:#fcfcfc; margin-bottom:10px; display:flex; flex-direction:column; gap:8px; }
.msg { max-width:85%; padding:8px 12px; border-radius:8px; font-size:13px; font-weight:600; line-height:1.4; }
.msg.parent { background:#e1f5fe; color:#1565c0; align-self:flex-start; border-bottom-right-radius:2px; }
.msg.admin { background:#fff3e0; color:#e65100; align-self:flex-end; border-bottom-left-radius:2px; }
</style>
</head>
<body>

<div id="parent-login-screen" class="container" style="max-width:400px; margin:50px auto 0 auto;">
    <div class="card" style="border-top-color:var(--primary-color); text-align:center;">
        <div style="font-size:45px; color:var(--accent-color); margin-bottom:10px;"><i class="bi bi-person-hearts"></i></div>
        <h2 style="justify-content:center; margin-bottom:4px; font-size:18px; font-weight:900;">بوابة ولي الأمر الذكية</h2>
        <p style="font-size:12px; color:#666; font-weight:bold; margin-bottom:20px;">مدرسة سالم الحسينان المتوسطة للبنين</p>
        
        <form onsubmit="window.handleParentLoginLive(event)">
            <label style="display:block; text-align:right; font-weight:700; font-size:13px; margin-bottom:6px; color:var(--primary-color);">أدخل رقم الطالب المعتمد بالسجل</label>
            <input type="text" id="parent-student-id" placeholder="رقم الطالب المعتمد" required>
            <button type="submit"><i class="bi bi-box-arrow-in-right"></i> دخول واستعراض ملف الطالب</button>
        </form>
    </div>
</div>

<div id="parent-dashboard-screen" class="container hidden" style="max-width:650px; margin:0 auto;">
    <div class="card" style="background:var(--primary-color); color:#fff; border:none; text-align:center; padding:25px;">
        <h3 style="font-weight:900; font-size:19px;">👤 الطالب: <span id="lbl-student-name">-</span></h3>
        <p style="font-size:12px; opacity:0.8; font-weight:bold; margin-top:3px;">الصف والفصل الدراسي الحالي: <span id="lbl-student-class">-</span></p>
        <button onclick="localStorage.removeItem('hs_parent'); location.reload();" style="width:auto; padding:4px 12px; font-size:11px; background:rgba(255,255,255,0.15); border:1px solid #fff; margin-top:12px; border-radius:4px;">تسجيل خروج آمن</button>
    </div>

    <div class="card" style="border-top-color:var(--danger-color);">
        <h2><i class="bi bi-calendar-x-fill" style="color:var(--danger-color);"></i> رصد وتفصيل غياب الحصص اليومي</h2>
        <div id="parent-attendance-area" style="font-size:13px; font-weight:bold; margin-top:8px; display:flex; flex-direction:column; gap:8px;">
            ⏳ جاري مراجعة كشوف رصد المعلمين السحابية...
        </div>
    </div>

    <div class="card" style="border-top-color:var(--success-color);">
        <h2><i class="bi bi-chat-left-text-fill" style="color:var(--success-color);"></i> صندوق المراسلة والردود مع إدارة المدرسة</h2>
        <div class="chat-box" id="parent-chat-bubbles"></div>
        <form onsubmit="window.sendParentMessageLive(event)" style="display:flex; gap:8px;">
            <input type="text" id="parent-msg-input" placeholder="اكتب رسالتك أو عذرك الطبي هنا..." style="margin-bottom:0;" required>
            <button type="submit" style="width:70px; background:var(--success-color);"><i class="bi bi-send-fill"></i></button>
        </form>
    </div>
</div>

<script type="module">
import { db } from './js/firebase-config.js';
import { collection, getDocs, addDoc, query, where, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

let activeStudent = null;

document.addEventListener("DOMContentLoaded", function() {
    const saved = localStorage.getItem('hs_parent');
    if(saved) {
        activeStudent = JSON.parse(saved);
        showParentDashboard();
    }
});

window.handleParentLoginLive = async function(e) {
    e.preventDefault();
    const studentId = document.getElementById('parent-student-id').value.trim();
    if(!studentId) return;

    try {
        const q = query(collection(db, 'students'), where('studentNumber', '==', studentId));
        const snap = await getDocs(q);
        let found = null;
        snap.forEach(doc => { found = doc.data(); });

        if(found) {
            activeStudent = found;
            localStorage.setItem('hs_parent', JSON.stringify(found));
            showParentDashboard();
        } else {
            alert('⚠️ تنبيه: لم يتم العثور على طالب مقيد بهذا الرقم، يرجى مراجعة الإدارة.');
        }
    } catch(err) { alert('خطأ في الاتصال: ' + err.message); }
};

function showParentDashboard() {
    document.getElementById('parent-login-screen').classList.add('hidden');
    document.getElementById('parent-dashboard-screen').classList.remove('hidden');
    document.getElementById('lbl-student-name').textContent = activeStudent.name;
    document.getElementById('lbl-student-class').textContent = activeStudent.classId;

    loadStudentAttendanceLive();
    loadParentChatThreadLive();
}

async function loadStudentAttendanceLive() {
    const area = document.getElementById('parent-attendance-area');
    try {
        const q = query(collection(db, 'attendance'), where('studentName', '==', activeStudent.name.trim()));
        const snap = await getDocs(q);
        
        let html = '';
        let absentCount = 0;

        // 🔥 الترقية المطلوبة: تفكيك وعرض الحصة المقيدة لايف لولي الأمر چدام كل تاريخ غياب
        snap.forEach(doc => {
            const d = doc.data();
            const periodLabel = d.period || 'غير محددة';
            const badgeClass = d.status === 'absent' ? 'danger' : 'success';
            const badgeText = d.status === 'absent' ? '🔴 غائب' : '🟢 حاضر';

            if(d.status === 'absent') absentCount++;

            html += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee; background:#fff; border-radius:6px;">
                    <span style="color:#555; font-weight:700;"><i class="bi bi-calendar3"></i> تاريخ الرصد: ${d.date}</span>
                    <span style="color:var(--accent-color); font-weight:800;"><i class="bi bi-clock-history"></i> ${periodLabel}</span>
                    <span class="badge ${badgeClass}">${badgeText}</span>
                </div>`;
        });

        if (absentCount === 0 && html !== '') {
            area.innerHTML = `<div style="background:#e8f8f5; color:green; padding:15px; border-radius:8px;"><span class="badge success">🟢 مواظب</span> ممتاز! الطالب ملتزم بالحضور ولم يسجل له أي غياب بالحصص.</div>` + html;
        } else {
            area.innerHTML = html || `<p style="text-align:center; color:#999; padding:15px;">💡 لا توجد سجلات حضور أو غياب مرفوعة لهذا الطالب حالياً.</p>`;
        }
    } catch(e) { area.innerHTML = "❌ تعذر سحب كشف رصد الغياب حالياً."; }
}

async function loadParentChatThreadLive() {
    const box = document.getElementById('parent-chat-bubbles');
    try {
        const q = query(collection(db, 'school_threads'), where('studentName', '==', activeStudent.name.trim()));
        const snap = await getDocs(q);
        let html = '';
        snap.forEach(doc => {
            const d = doc.data();
            const isParent = d.senderRole === 'parent';
            html += `
            <div class="msg ${isParent ? 'parent' : 'admin'}">
                <span style="font-size:10px; opacity:0.75; display:block; font-weight:bold; margin-bottom:2px;">
                    ${isParent ? 'أنت (ولي الأمر)' : 'إدارة المدرسة'}
                </span>
                ${d.message}
            </div>`;
        });
        box.innerHTML = html || `<p style="text-align:center; color:#aaa; font-size:12px; padding:15px;">💬 لا توجد مراسلات سابقة. بإمكانك توجيه رسالتك للإدارة أدناه.</p>`;
        box.scrollTop = box.scrollHeight;
    } catch(e) { box.innerHTML = "<p style='color:red;'>خطأ في استدعاء صندوق المحادثة</p>"; }
}

window.sendParentMessageLive = async function(e) {
    e.preventDefault();
    const input = document.getElementById('parent-msg-input');
    const msg = input.value.trim();
    if(!msg || !activeStudent) return;

    try {
        await addDoc(collection(db, 'school_threads'), {
            studentName: activeStudent.name,
            classId: activeStudent.classId,
            message: msg,
            senderRole: 'parent',
            createdAt: serverTimestamp()
        });
        input.value = '';
        loadParentChatThreadLive();
    } catch(err) { alert('تعذر إرسال الرسالة: ' + err.message); }
};
</script>
</body>
</html>
