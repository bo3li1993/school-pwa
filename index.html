<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0a1628">
<meta name="mobile-web-app-capable" content="yes">
<title>متوسطة سالم الحسينان</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0a1628;--blue:#1a56db;--blue2:#1e40af;
  --gold:#f59e0b;--white:#fff;--gray:#94a3b8;
  --danger:#dc2626;--success:#059669;--bg:#f0f4f8;
  --border:#e2e8f0;--text:#0f172a;--text2:#475569;
}
html,body{min-height:100vh;font-family:'Tajawal',sans-serif;background:var(--navy);color:var(--white);overflow-x:hidden}

/* BG */
.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(26,86,219,.2) 0%,transparent 60%),
  radial-gradient(ellipse 60% 80% at 80% 90%,rgba(245,158,11,.1) 0%,transparent 50%),
  linear-gradient(160deg,#0a1628 0%,#0d1f3c 50%,#091220 100%)}
.orb{position:fixed;border-radius:50%;filter:blur(80px);z-index:0;pointer-events:none}
.orb1{width:500px;height:500px;background:rgba(26,86,219,.1);top:-150px;right:-100px;animation:float 8s ease-in-out infinite}
.orb2{width:400px;height:400px;background:rgba(245,158,11,.07);bottom:-100px;left:-80px;animation:float 10s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}

/* WRAPPER */
.wrap{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px}

/* HEADER */
.header{text-align:center;margin-bottom:32px;animation:slideDown .7s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
.logo-img{width:90px;height:90px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(26,86,219,.5));animation:glow 4s ease-in-out infinite}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 20px rgba(26,86,219,.4))}50%{filter:drop-shadow(0 0 35px rgba(245,158,11,.5))}}
.school-name{font-size:20px;font-weight:900;margin-top:12px;background:linear-gradient(135deg,#fff,#cbd5e1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.school-sub{font-size:12px;color:var(--gray);margin-top:4px}

/* CARD */
.card{width:100%;max-width:420px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:32px 28px;backdrop-filter:blur(20px);box-shadow:0 25px 60px rgba(0,0,0,.4);animation:slideUp .7s cubic-bezier(.34,1.56,.64,1) .1s both}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* TABS */
.tabs{display:flex;gap:4px;background:rgba(0,0,0,.3);border-radius:14px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;padding:10px;border-radius:10px;border:none;background:transparent;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;color:var(--gray);transition:all .3s}
.tab-btn.active{background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;box-shadow:0 4px 15px rgba(26,86,219,.4)}

/* FORM */
.form-title{font-size:17px;font-weight:800;margin-bottom:4px}
.form-sub{font-size:12px;color:var(--gray);margin-bottom:20px}
.field{margin-bottom:14px}
.flabel{font-size:11px;font-weight:700;color:var(--gray);margin-bottom:5px;display:block;letter-spacing:.5px}
.fwrap{position:relative}
.ficon{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.finput{width:100%;padding:12px 42px 12px 14px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;color:var(--white);font-family:'Tajawal',sans-serif;font-size:15px;font-weight:600;outline:none;transition:all .25s}
.finput::placeholder{color:rgba(255,255,255,.25)}
.finput:focus{border-color:var(--blue);background:rgba(26,86,219,.1);box-shadow:0 0 0 3px rgba(26,86,219,.15)}
.finput.err{border-color:var(--danger)}
.eye{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray);font-size:15px}
.eye:hover{color:white}

/* REMEMBER */
.remember{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.remember input{width:16px;height:16px;cursor:pointer;accent-color:var(--blue)}
.remember label{font-size:13px;color:var(--gray);cursor:pointer}

/* ALERT */
.alert{display:none;padding:11px 13px;border-radius:11px;font-size:13px;font-weight:700;margin-bottom:14px;align-items:center;gap:7px;background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);color:#fca5a5}
.alert.show{display:flex}

/* BTN */
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue),var(--blue2));border:none;border-radius:13px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;color:white;transition:all .25s;box-shadow:0 8px 25px rgba(26,86,219,.4)}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 35px rgba(26,86,219,.5)}
.login-btn:disabled{opacity:.7;cursor:not-allowed;transform:none}
.btn-inner{display:flex;align-items:center;justify-content:center;gap:8px}
.sp{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.login-btn.loading .sp{display:block}

/* SUCCESS */
.success-ov{display:none;position:fixed;inset:0;background:var(--navy);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.success-ov.show{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.si{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--success),#059669);display:flex;align-items:center;justify-content:center;font-size:40px;animation:pop .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 40px rgba(16,185,129,.4)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.sname{font-size:22px;font-weight:900}
.srole{font-size:13px;color:var(--gray)}
.sbar{width:200px;height:4px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.sbar-fill{height:100%;background:linear-gradient(90deg,var(--success),var(--blue));border-radius:4px;animation:fill 2.5s linear forwards}
@keyframes fill{from{width:0%}to{width:100%}}

/* STATS SECTION */
.stats-section{width:100%;max-width:420px;margin-top:20px;animation:slideUp .7s cubic-bezier(.34,1.56,.64,1) .3s both}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;text-align:center;backdrop-filter:blur(10px)}
.stat-num{font-size:28px;font-weight:900}
.stat-lbl{font-size:11px;color:var(--gray);margin-top:2px}
.s1 .stat-num{color:#60a5fa}
.s2 .stat-num{color:#f87171}
.s3 .stat-num{color:#34d399}
.s4 .stat-num{color:#fbbf24}

/* COMING SOON */
.coming{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:16px;padding:20px;text-align:center;margin-top:8px}
.coming-icon{font-size:36px;margin-bottom:8px}
.coming-title{font-size:15px;font-weight:700;color:#fcd34d}
.coming-sub{font-size:12px;color:var(--gray);margin-top:4px}

/* FOOTER */
.footer{margin-top:24px;text-align:center;font-size:11px;color:rgba(255,255,255,.2)}

@media(max-width:400px){.card{padding:24px 16px}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrap">
  <div class="header">
    <img id="logoImg" src="" class="logo-img" alt="شعار المدرسة" onerror="this.style.display='none'">
    <div class="school-name">متوسطة سالم الحسينان</div>
    <div class="school-sub">نظام إدارة الغياب والحضور</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" data-tab="staff">👔 موظفو المدرسة</button>
      <button class="tab-btn" data-tab="parent">👨‍👦 ولي الأمر</button>
    </div>

    <!-- Staff -->
    <div id="staffForm">
      <div class="form-title">مرحباً بك 👋</div>
      <div class="form-sub">سجّل دخولك للوصول إلى النظام</div>

      <div class="alert" id="alertEl"><span>⚠️</span><span id="alertMsg"></span></div>

      <div class="field">
        <label class="flabel">رقم المستخدم</label>
        <div class="fwrap">
          <span class="ficon">🪪</span>
          <input type="text" class="finput" id="userId" placeholder="أدخل رقم المستخدم" autocomplete="off" inputmode="numeric">
        </div>
      </div>

      <div class="field">
        <label class="flabel">كلمة المرور</label>
        <div class="fwrap">
          <span class="ficon">🔒</span>
          <input type="password" class="finput" id="pass" placeholder="أدخل كلمة المرور">
          <button class="eye" id="eyeToggle" id="eyeBtn">👁️</button>
        </div>
      </div>

      <div class="remember">
        <input type="checkbox" id="rem">
        <label for="rem">تذكرني</label>
      </div>

      <button class="login-btn" id="loginBtn">
        <div class="btn-inner">
          <div class="sp"></div>
          <span id="btnTxt">تسجيل الدخول</span>
          <span>←</span>
        </div>
      </button>
    </div>

    <!-- Parent -->
    <div id="parentForm" style="display:none">
      <div class="form-title">بوابة ولي الأمر 👨‍👦</div>
      <div class="coming">
        <div class="coming-icon">🚧</div>
        <div class="coming-title">قريباً</div>
        <div class="coming-sub">بوابة أولياء الأمور تحت التطوير</div>
      </div>
    </div>
  </div>

  <!-- Live Stats -->
  <div class="stats-section" id="statsSection" style="display:none">
    <div class="stats-grid">
      <div class="stat-card s1"><div class="stat-num" id="st-total">—</div><div class="stat-lbl">إجمالي الطلاب</div></div>
      <div class="stat-card s2"><div class="stat-num" id="st-absent">—</div><div class="stat-lbl">غائبون اليوم</div></div>
      <div class="stat-card s3"><div class="stat-num" id="st-reg">—</div><div class="stat-lbl">فصول سجّلت</div></div>
      <div class="stat-card s4"><div class="stat-num" id="st-users">—</div><div class="stat-lbl">مستخدمون</div></div>
    </div>
  </div>

  <div class="footer">متوسطة سالم الحسينان © 2026</div>
</div>

<!-- Success -->
<div class="success-ov" id="successOv">
  <div class="si">✓</div>
  <div class="sname" id="sName"></div>
  <div class="srole" id="sRole"></div>
  <div class="sbar"><div class="sbar-fill"></div></div>
  <div style="font-size:13px;color:var(--gray)">جارٍ تحميل النظام...</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs, query, where, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDEA77qGfSK7w5rYynyzP9-mvD13rRT0tU",
  authDomain: "hosainan-school.firebaseapp.com",
  projectId: "hosainan-school",
  storageBucket: "hosainan-school.firebasestorage.app",
  messagingSenderId: "264264994076",
  appId: "1:264264994076:web:1a87730b7d3c684bdf3ed9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── LOGO ──
// Using stored logo
const storedLogo = localStorage.getItem('school_logo');
if(storedLogo) document.getElementById('logoImg').src = storedLogo;

// ── REMEMBER ME ──
window.addEventListener('load', function(){
  const saved = localStorage.getItem('hs_creds');
  if(saved){
    try{
      const d = JSON.parse(saved);
      document.getElementById('userId').value = d.u || '';
      document.getElementById('pass').value = d.p || '';
      document.getElementById('rem').checked = true;
    }catch(e){}
  }
});

// ── TAB SWITCH ──
function switchTab(tab, btn){
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active',(i===0&&tab==='staff')||(i===1&&tab==='parent'));
  });
  document.getElementById('staffForm').style.display = tab==='staff'?'block':'none';
  document.getElementById('parentForm').style.display = tab==='parent'?'block':'none';
  hideErr();
};

// ── EYE ──
function toggleEye(){
  const i=document.getElementById('pass'),b=document.getElementById('eyeBtn');
  i.type=i.type==='password'?'text':'password';
  b.textContent=i.type==='password'?'👁️':'🙈';
};

// ── ALERT ──
function showErr(msg){
  const el=document.getElementById('alertEl');
  document.getElementById('alertMsg').textContent=msg;
  el.classList.add('show');
  document.getElementById('userId').classList.add('err');
  document.getElementById('pass').classList.add('err');
}
function hideErr(){
  document.getElementById('alertEl').classList.remove('show');
  document.getElementById('userId').classList.remove('err');
  document.getElementById('pass').classList.remove('err');
}

// ── LOGIN ──
async function doLogin(){
  const userId = document.getElementById('userId').value.trim();
  const pass = document.getElementById('pass').value.trim();
  const rem = document.getElementById('rem').checked;
  const btn = document.getElementById('loginBtn');
  hideErr();

  if(!userId || !pass){ showErr('يرجى إدخال رقم المستخدم وكلمة المرور'); return; }

  btn.disabled=true; btn.classList.add('loading');
  document.getElementById('btnTxt').textContent='جارٍ التحقق...';

  try{
    // Login using email format: userId@hosainan.edu
    const email = userId + '@hosainan.edu';
    const cred = await signInWithEmailAndPassword(auth, email, pass);

    // Get user data from Firestore
    const userDoc = await getDoc(doc(db,'users',cred.user.uid));
    let userData = {name:'مستخدم', role:'teacher'};
    if(userDoc.exists()) userData = userDoc.data();

    // Save session
    if(rem) localStorage.setItem('hs_creds',JSON.stringify({u:userId,p:pass}));
    else localStorage.removeItem('hs_creds');
    localStorage.setItem('hs_user', JSON.stringify({...userData, uid: cred.user.uid}));

    // Show success
    const roleText = userData.role==='admin'?'👔 مدير المدرسة':userData.role==='teacher'?'👨‍🏫 معلم':'مستخدم';
    document.getElementById('sName').textContent = 'أهلاً، ' + userData.name;
    document.getElementById('sRole').textContent = roleText;
    document.getElementById('successOv').classList.add('show');

    // Redirect
    const url = userData.role==='admin'?'admin.html':'teacher.html';
    setTimeout(function(){ window.location.href = url; }, 2500);

  }catch(e){
    console.error(e);
    if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'){
      showErr('رقم المستخدم أو كلمة المرور غير صحيحة');
    } else if(e.code==='auth/too-many-requests'){
      showErr('تم تجاوز عدد المحاولات، حاول لاحقاً');
    } else {
      showErr('فشل الاتصال، تحقق من الإنترنت');
    }
    btn.disabled=false; btn.classList.remove('loading');
    document.getElementById('btnTxt').textContent='تسجيل الدخول';
  }
};

// ── EVENT LISTENERS ──
document.querySelectorAll('[data-tab]').forEach(function(btn){
  btn.addEventListener('click', function(){
    var tab = this.getAttribute('data-tab');
    document.querySelectorAll('[data-tab]').forEach(function(b){ b.classList.remove('active'); });
    this.classList.add('active');
    document.getElementById('staffForm').style.display = tab==='staff'?'block':'none';
    document.getElementById('parentForm').style.display = tab==='parent'?'block':'none';
    hideErr();
  });
});

document.getElementById('eyeToggle').addEventListener('click', function(){
  var i=document.getElementById('pass'),b=document.getElementById('eyeBtn');
  i.type=i.type==='password'?'text':'password';
  b.textContent=i.type==='password'?'👁️':'🙈';
});

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('userId').addEventListener('keyup',function(e){if(e.key==='Enter') document.getElementById('pass').focus();});
document.getElementById('pass').addEventListener('keyup',function(e){if(e.key==='Enter') doLogin();});
</script>
</body>
</html>
