<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>تسجيل الدخول</title></head>
<body>
    <form onsubmit="window.login(event)">
        <input type="text" id="id" placeholder="رقم المستخدم" required>
        <input type="password" id="pass" placeholder="كلمة المرور" required>
        <button type="submit">دخول</button>
    </form>

    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import { collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        window.login = async (e) => {
            e.preventDefault();
            const id = document.getElementById('id').value;
            const pass = document.getElementById('pass').value;
            
            const snap = await getDocs(query(collection(db, 'users'), where('userId', '==', id)));
            if(snap.empty) return alert("خطأ في البيانات");
            
            const userData = snap.docs[0].data();
            if(userData.authMigrated) {
                await signInWithEmailAndPassword(auth, userData.email, pass);
            } else if(userData.plainPass !== pass) return alert("كلمة المرور خاطئة");
            
            localStorage.setItem('hs_user', JSON.stringify(userData));
            window.location.replace('admin.html');
        };
    </script>
</body>
</html>
