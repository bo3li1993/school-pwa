<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<title>بوابة الدخول الموحدة - المنظومة الرقمية الشاملة</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root { 
    --primary-color: #1a1a2e; --accent-color: #e67e22; 
    --bg-dark: #0f172a; --card-bg: #ffffff; 
}
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Cairo', sans-serif; }
body { 
    background: linear-gradient(135deg, var(--bg-dark) 0%, #1e1e38 100%); 
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; 
}
.login-card { 
    background: var(--card-bg); border-radius: 16px; padding: 35px 30px; width: 100%; max-width: 420px; 
    box-shadow: 0 15px 35px rgba(0,0,0,0.4); border-top: 6px solid var(--accent-color); text-align: right; 
}
.login-logo { font-size: 50px; color: var(--primary-color); text-align: center; margin-bottom: 10px; }
.login-card h2 { font-size: 20px; font-weight: 900; color: var(--primary-color); text-align: center; margin-bottom: 4px; }
.login-card p { font-size: 12px; color: #666; font-weight: bold; text-align: center; margin-bottom: 25px; }
label { font-weight: 700; font-size: 13px; color: var(--primary-color); display: block; margin-bottom: 6px; }
input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-weight: 600; text-align: right; outline: none; font-size: 14px; }
input:focus { border-color: var(--accent-color); }
button { 
    background: var(--primary-color); color: #fff; border: none; padding: 13px; border-radius: 8px; 
    font-weight: 700; cursor: pointer; width: 100%; font-size: 15px; transition: all 0.2s; 
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-top: 5px;
}
button:hover { background: var(--accent-color); box-shadow: 0 4px 10px rgba(230,126,34,0.2); }
.parent-link { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #eee; font-size: 13px; font-weight: bold; }
.parent-link a { color: #2980b9; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }

#install-app-btn {
    display: none; background: #27ae60; color: #fff; border: none; padding: 10px 15px; 
    border-radius: 30px; font-weight: 700; font-size: 13px; margin-bottom: 15px; width: 100%;
    box-shadow: 0 4px 10px rgba(39,174,96,0.3); cursor: pointer; text-align: center;
}
</style>
</head>
<body>

<div style="width: 100%; max-width: 420px;">
    <button id="install-app-btn"><i class="bi bi-phone-vibrate-fill"></i> 📲 ثبّت تطبيق المنظومة على هاتفِك الحين</button>
</div>

<div class="login-card">
    <div class="login-logo"><i class="bi bi-shield-lock-fill"></i></div>
    <h2>المنظومة الرقمية الموحدة</h2>
    <p>مدرسة سالم الحسينان المتوسطة للبنين</p>
    
    <form id="system-login-form-submit">
        <label><i class="bi bi-person-fill"></i> رقم المستخدم / المعرف (User ID)</label>
        <input type="text" id="login-user-id" placeholder="أدخل رقم المستخدم الخاص بك" required>
        
        <label><i class="bi bi-key-fill"></i> رمز الحماية السري (Password)</label>
        <input type="password" id="login-password" placeholder="أدخل كلمة المرور" required>
        
        <button type="submit" id="btn-login-submit">
            <i class="bi bi-box-arrow-in-right"></i> تسجيل دخول آمن للمنصة
        </button>
    </form>

    <div class="parent-link">
        <a href="parent.html"><i class="bi bi-person-hearts"></i> هل أنت ولي أمر طالب؟ اضغط هنا للدخول</a>
    </div>
</div>

<script type="module">
import { db } from './js/firebase-config.js';
import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

// ⏳ 1. فحص وجود جلسة سابقة مستقرة لتسريع الدخول آلياً لراحتك
const saved = localStorage.getItem('hs_user');
if(saved){
    try{
        const u = JSON.parse(saved);
        if(u && u.role) window.location.replace(u.role === 'admin' ? 'admin.html' : 'teacher.html');
    }catch(e) { localStorage.removeItem('hs_user'); }
}

// 🛡️ تكتيك حماية حركي: استدعاء الـ App والـ Auth بذكاء بدون إجبار ملف الكونفيج على التصدير
const currentFirebaseApp = getApps()[0];
const firebaseAuthInstance = getAuth(currentFirebaseApp);

let deferredPrompt;
const installBtn = document.getElementById('install-app-btn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
});

// 🔑 3. محرك الفحص والولوج المرن الموحد والمطهر محلياً بالكامل
async function executeSecureLoginProcess(e) {
    if(e) e.preventDefault();
    
    const userId = document.getElementById('login-user-id').value.trim();
    const pass = document.getElementById('login-password').value.trim();
    const btn = document.getElementById('btn-login-submit');

    if(!userId || !pass) { alert('⚠️ يرجى إدخال رقم المستخدم ورمز الحماية.'); return; }

    const targetEmail = `${userId}@hosainan.school`;
    btn.disabled = true;
    btn.innerHTML = `<i class="bi bi-hourglass-split"></i> جاري فحص جدار الحماية...`;

    try {
        let isAuthSuccess = false;
        let foundUserDoc = null;

        // أ) محاولة الدخول بنظام التشفير العالمي أولاً
        try {
            await signInWithEmailAndPassword(firebaseAuthInstance, targetEmail, pass);
            isAuthSuccess = true;
            console.log("✓ تم الولوج آمن عبر الـ Auth.");
        } catch(authErr) {
            console.log("ℹ️ الحساب غير مرحل بعد، جاري الفرز والتطهير المحلي للمطابقة...");
        }

        // ب) جلب السجلات وعمل الفرز المحلي الفولاذي المقاوم للمسافات واختلاف الأنواع (نص ضد رقم)
        const snap = await getDocs(collection(db, 'users'));
        
        snap.forEach(doc => {
            const d = doc.data();
            const dbUid  = String(d.userId || '').trim();
            const dbPass = String(d.plainPass || '').trim();

            if (dbUid === userId) {
                if (isAuthSuccess || dbPass === pass) {
                    foundUserDoc = {
                        id: doc.id,
                        name: d.name || 'موظف المنظومة',
                        role: String(d.role || '').trim().toLowerCase(),
                        classId: d.classId || '',
                        userId: dbUid
                    };
                }
            }
        });

        if(!foundUserDoc) {
            alert("❌ عذراً: رقم المستخدم أو كلمة المرور غير صحيحة.");
            btn.disabled = false;
            btn.innerHTML = `<i class="bi bi-box-arrow-in-right"></i> تسجيل دخول آمن للمنصة`;
            return;
        }

        // حفظ الجلسة النظيفة والتوجيه الفوري المستقر
        localStorage.setItem('hs_user', JSON.stringify(foundUserDoc));
        window.location.replace(foundUserDoc.role === 'admin' ? 'admin.html' : 'teacher.html');

    } catch(err) {
        alert("⚠️ عطل في الاتصال بالسيرفر: " + err.message);
        btn.disabled = false;
        btn.innerHTML = `<i class="bi bi-box-arrow-in-right"></i> تسجيل دخول آمن للمنصة`;
    }
}

// ربط المحرك بحدث إرسال الاستمارة والضغط معاً لضمان العمل على كيبورد الموبايل والكمبيوتر صخر
document.getElementById('system-login-form-submit').addEventListener('submit', executeSecureLoginProcess);

document.getElementById('login-password').addEventListener('keypress', e => {
    if(e.key === 'Enter') executeSecureLoginProcess(e);
});
document.getElementById('login-user-id').addEventListener('keypress', e => {
    if(e.key === 'Enter') document.getElementById('login-password').focus();
});

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
