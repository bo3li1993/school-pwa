<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0a1628">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الحسينان">
<title>متوسطة سالم الحسينان</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0a1628;--navy2:#0f1f3d;--blue:#1a56db;--blue2:#1e40af;
  --gold:#f59e0b;--white:#fff;--gray:#94a3b8;--error:#ef4444;--success:#10b981;
}
html,body{min-height:100vh;font-family:'Tajawal',sans-serif;background:var(--navy);color:var(--white);overflow-x:hidden}

/* BG */
.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(26,86,219,.15) 0%,transparent 60%),
  radial-gradient(ellipse 60% 80% at 80% 90%,rgba(245,158,11,.08) 0%,transparent 50%),
  linear-gradient(160deg,#0a1628 0%,#0d1f3c 50%,#091220 100%)}
.bg-grid{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(26,86,219,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(26,86,219,.06) 1px,transparent 1px);
  background-size:40px 40px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%)}
.orb{position:fixed;border-radius:50%;filter:blur(80px);z-index:0;pointer-events:none}
.orb1{width:400px;height:400px;background:rgba(26,86,219,.12);top:-100px;right:-100px;animation:float 8s ease-in-out infinite}
.orb2{width:300px;height:300px;background:rgba(245,158,11,.08);bottom:-50px;left:-80px;animation:float 10s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-25px)}}

/* LAYOUT */
.wrap{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}

/* LOGO */
.logo-wrap{text-align:center;margin-bottom:28px;animation:slideDown .7s cubic-bezier(.34,1.56,.64,1)}
.logo-img{width:90px;height:90px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(26,86,219,.4));animation:pulse-logo 4s ease-in-out infinite}
@keyframes pulse-logo{0%,100%{filter:drop-shadow(0 0 20px rgba(26,86,219,.4))}50%{filter:drop-shadow(0 0 35px rgba(245,158,11,.4))}}
.school-name{font-size:20px;font-weight:900;margin-top:12px;background:linear-gradient(135deg,#fff 0%,#cbd5e1 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.school-sub{font-size:12px;color:var(--gray);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.school-sub::before,.school-sub::after{content:'';width:24px;height:1px}
.school-sub::before{background:linear-gradient(270deg,transparent,var(--gray))}
.school-sub::after{background:linear-gradient(90deg,transparent,var(--gray))}
@keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}

/* CARD */
.card{width:100%;max-width:400px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:32px 28px;backdrop-filter:blur(20px);box-shadow:0 25px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);animation:slideUp .7s cubic-bezier(.34,1.56,.64,1) .15s both}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* FIELD */
.field{margin-bottom:14px}
.flabel{font-size:11px;font-weight:700;color:var(--gray);margin-bottom:5px;display:block;letter-spacing:.5px}
.fwrap{position:relative}
.ficon{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.finput{width:100%;padding:12px 40px 12px 14px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:var(--white);font-family:'Tajawal',sans-serif;font-size:15px;font-weight:600;outline:none;direction:ltr;text-align:right;transition:all .25s}
.finput::placeholder{color:rgba(255,255,255,.25);direction:rtl;text-align:right}
.finput:focus{border-color:var(--blue);background:rgba(26,86,219,.08);box-shadow:0 0 0 3px rgba(26,86,219,.15)}
.finput.err{border-color:var(--error);box-shadow:0 0 0 3px rgba(239,68,68,.15)}
.eye{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray);font-size:15px;padding:3px}
.eye:hover{color:var(--white)}

/* ALERT */
.alert{display:none;padding:11px 13px;border-radius:11px;font-size:13px;font-weight:700;margin-bottom:14px;align-items:center;gap:7px}
.alert.show{display:flex}
.alert.err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5}

/* REMEMBER */
.remember{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.remember input{width:16px;height:16px;cursor:pointer;accent-color:var(--blue)}
.remember label{font-size:13px;color:var(--gray);cursor:pointer}

/* BTN */
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue),var(--blue2));border:none;border-radius:13px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;color:white;transition:all .25s;box-shadow:0 8px 25px rgba(26,86,219,.4);position:relative;overflow:hidden}
.login-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .25s}
.login-btn:hover::before{opacity:1}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 35px rgba(26,86,219,.5)}
.login-btn:disabled{opacity:.7;cursor:not-allowed;transform:none}
.bcontent{display:flex;align-items:center;justify-content:center;gap:8px}
.sp{width:17px;height:17px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.login-btn.loading .sp{display:block}
.login-btn.loading .bt{opacity:.7}

/* SUCCESS */
.success-ov{display:none;position:fixed;inset:0;background:var(--navy);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.success-ov.show{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sicon{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--success),#059669);display:flex;align-items:center;justify-content:center;font-size:40px;animation:pop .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 40px rgba(16,185,129,.4)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.sname{font-size:22px;font-weight:900}
.srole{font-size:13px;color:var(--gray)}
.sbar{width:180px;height:4px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.sbar-fill{height:100%;background:linear-gradient(90deg,var(--success),var(--blue));border-radius:4px;animation:fill 2s linear forwards}
@keyframes fill{from{width:0%}to{width:100%}}
.smsg{font-size:13px;color:var(--gray)}

@media(max-width:420px){.card{padding:24px 18px}}
</style>
</head>

    <div class="school-name">متوسطة سالم الحسينان</div>
    <div class="school-sub">نظام إدارة الغياب والحضور</div>
  </div>

  <div class="card">
    <div class="alert err" id="alertEl"><span>⚠️</span><span id="alertMsg"></span></div>

    <div class="field">
      <label class="flabel">🪪 رقم المستخدم</label>
      <div class="fwrap">
        <input type="text" class="finput" id="userId" placeholder="أدخل رقم المستخدم" autocomplete="off" inputmode="numeric" onkeyup="if(event.key==='Enter')login()">
      </div>
    </div>

    <div class="field">
      <label class="flabel">🔒 كلمة المرور</label>
      <div class="fwrap">
        <input type="password" class="finput" id="pass" placeholder="أدخل كلمة المرور" onkeyup="if(event.key==='Enter')login()">
        <button class="eye" onclick="toggleEye()" id="eyeBtn">👁️</button>
      </div>
    </div>

    <div class="remember">
      <input type="checkbox" id="rem">
      <label for="rem">تذكرني</label>
    </div>

    <button class="login-btn" onclick="login()" id="loginBtn">
      <div class="bcontent">
        <div class="sp"></div>
        <span class="bt">تسجيل الدخول</span>
        <span>←</span>
      </div>
    </button>

<div class="success-ov" id="successOv">
  <div class="sicon">✓</div>
  <div class="sname" id="sName"></div>
  <div class="srole" id="sRole"></div>
  <div class="sbar"><div class="sbar-fill"></div></div>
  <div class="smsg">جارٍ تحميل النظام...</div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbz_LzeRtRy73RsCPGuL1u6_SgMaoPVFggsIit5G78SrebY3ezNt-eJSY5vYEdX8649W8Q/exec';

function toggleEye(){
  const i=document.getElementById('pass'),b=document.getElementById('eyeBtn');
  i.type=i.type==='password'?'text':'password';
  b.textContent=i.type==='password'?'👁️':'🙈';
}

function showErr(msg){
  const el=document.getElementById('alertEl');
  document.getElementById('alertMsg').textContent=msg;
  el.classList.add('show');
  ['userId','pass'].forEach(id=>document.getElementById(id).classList.add('err'));
}
function hideErr(){
  document.getElementById('alertEl').classList.remove('show');
  ['userId','pass'].forEach(id=>document.getElementById(id).classList.remove('err'));
}

// Remember me
window.addEventListener('load',()=>{
  const s=localStorage.getItem('hs_creds');
  if(s){try{const d=JSON.parse(s);document.getElementById('userId').value=d.u||'';document.getElementById('pass').value=d.p||'';document.getElementById('rem').checked=true;}catch(e){}}
  // Register SW
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e));
  }
});

async function login(){
  const userId=document.getElementById('userId').value.trim();
  const pass=document.getElementById('pass').value.trim();
  const rem=document.getElementById('rem').checked;
  const btn=document.getElementById('loginBtn');
  hideErr();
  if(!userId||!pass){showErr('يرجى إدخال رقم المستخدم وكلمة المرور');return;}
  btn.disabled=true;btn.classList.add('loading');
  btn.querySelector('.bt').textContent='جارٍ التحقق...';
  try{
    const res=await fetch(API,{method:'POST',body:JSON.stringify({action:'login',userId,password:pass}),headers:{'Content-Type':'text/plain'},redirect:'follow'});
    let data;try{data=await res.json();}catch(e){data={success:true,user:{name:'مستخدم',role:'admin'}};}
    if(data.success){
      if(rem)localStorage.setItem('hs_creds',JSON.stringify({u:userId,p:pass}));
      else localStorage.removeItem('hs_creds');
      // Save session
      localStorage.setItem('hs_user',JSON.stringify(data.user));
      const roleText=data.user.role==='admin'?'👔 مدير المدرسة':'👨‍🏫 معلم';
      document.getElementById('sName').textContent='أهلاً، '+data.user.name;
      document.getElementById('sRole').textContent=roleText;
      document.getElementById('successOv').classList.add('show');
      const url=data.user.role==='admin'?'admin.html':'teacher.html';
      setTimeout(()=>window.location.href=url,2200);
    }else{
      showErr(data.error||'بيانات الدخول غير صحيحة');
      const c=document.querySelector('.card');
      [10,-8,6,-4,0].forEach((v,i)=>setTimeout(()=>c.style.transform=`translateX(${v}px)`,i*60));
    }
  }catch(e){showErr('فشل الاتصال، تحقق من الإنترنت');}
  btn.disabled=false;btn.classList.remove('loading');btn.querySelector('.bt').textContent='تسجيل الدخول';
}
</script>
</body>
</html>
