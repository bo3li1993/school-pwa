<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>بوابة الدخول الذكية - متوسطة سالم الحسينان</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="images/logo.svg" alt="شعار متوسطة سالم الحسينان" class="logo">
      <h1>بوابة الدخول الذكية</h1>
    </div>
    
    <div class="login-form">
      <h2>تسجيل الدخول</h2>
      <form>
        <div class="input-group">
          <img src="images/icons/user.svg" class="icon">
          <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
        </div>
        
        <div class="input-group">
          <img src="images/icons/lock.svg" class="icon">
          <input type="password" id="password" placeholder="كلمة المرور" autocomplete="off" style="-webkit-text-security:disc">
          <button class="toggle-pass" onclick="togglePassword('password',this)">👁️</button>
        </div>
        
        <div class="checkbox">
          <input type="checkbox" id="remember">
          <label for="remember">تذكرني</label>
        </div>
        
        <button type="submit">دخول <img src="images/icons/arrow.svg"></button>
      </form>
      
      <div class="links">
        <a href="#">نسيت كلمة المرور؟</a>
        <a href="#">تسجيل حساب جديد</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDEA77qGfSK7w5rYynyzP9-mvD13rRT0tU",
      authDomain: "hosainan-school.firebaseapp.com",
      projectId: "hosainan-school",
      // Add other configuration options as needed
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const loginForm = document.querySelector('form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      try {
        const snapshot = await db.collection('users').where('userId', '==', username).where('plainPass', '==', password).get();

        if (snapshot.empty) {
          console.log('No matching user found');
          alert('اسم المستخدم أو كلمة المرور غير صحيحة');
          return;
        }

        const userDoc = snapshot.docs[0];
        const userData = userDoc.data();

        const found = {
          id: userDoc.id,
          name: userData.name || '',
          role: userData.role || '',
          classId: userData.classId || '',
          userId: userData.userId
        };

        localStorage.setItem('hs_user', JSON.stringify(found));

        // توجيه حسب الصلاحية
        console.log('Found user role:', found.role);
        console.log('Redirecting user role:', found.role);

        const targetPage = found.role === 'admin' ? 'admin.html' : 'teacher.html';
        sessionStorage.setItem('hs_redirect', targetPage);

        setTimeout(function() {
          window.location.replace(targetPage);
        }, 800);

        setTimeout(function() {
          if (window.location.href.indexOf('index.html') !== -1 || window.location.pathname === '/school-pwa/' || window.location.pathname === '/school-pwa/index.html') {
            window.location.replace(targetPage);
          }
        }, 2500);

      } catch (error) {
        console.error('Error logging in:', error);
        alert('حدث خطأ أثناء تسجيل الدخول. يرجى المحاولة مرة أخرى.');
      }
    });

    const pendingRedirect = sessionStorage.getItem('hs_redirect');
    const hasUser = localStorage.getItem('hs_user');
    if (pendingRedirect && hasUser) {
      sessionStorage.removeItem('hs_redirect');
      window.location.replace(pendingRedirect);
    }

    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.style.webkitTextSecurity === 'disc' || input.style.webkitTextSecurity === '') {
        input.style.webkitTextSecurity = 'none';
        btn.textContent = '🙈';
      } else {
        input.style.webkitTextSecurity = 'disc';
        btn.textContent = '👁️';
      }
    }
  </script>
</body>
</html>
