<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة الدخول الذكية - متوسطة سالم الحسينان</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="images/logo.svg" alt="شعار متوسطة سالم الحسينان" class="logo">
      <h1>بوابة الدخول الذكية</h1>
    </div>
    
    <div class="login-form">
      <h2>تسجيل الدخول</h2>
      <form>
        <div class="input-group">
          <img src="images/icons/user.svg" class="icon">
          <input type="text" id="username" placeholder="اسم المستخدم" required>
        </div>
        
        <div class="input-group">
          <img src="images/icons/lock.svg" class="icon">
          <input type="password" id="password" placeholder="كلمة المرور" required>
        </div>
        
        <div class="checkbox">
          <input type="checkbox" id="remember">
          <label for="remember">تذكرني</label>
        </div>
        
        <button type="submit">دخول <img src="images/icons/arrow.svg"></button>
      </form>
      
      <div class="links">
        <a href="#">نسيت كلمة المرور؟</a>
        <a href="#">تسجيل حساب جديد</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script>
    // Firebase configuration
    const firebaseConfig = {
      // Add your Firebase project configuration here
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const loginForm = document.querySelector('form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      try {
        const usersRef = db.collection('users');
        const snapshot = await usersRef.where('userId', '==', username).where('plainPass', '==', password).get();

        if (snapshot.empty) {
          console.log('No matching user found');
          alert('اسم المستخدم أو كلمة المرور غير صحيحة');
          return;
        }

        const userDoc = snapshot.docs[0];
        const userData = userDoc.data();

        const found = {
          id: userDoc.id,
          name: userData.name || '',
          role: userData.role || '',
          classId: userData.classId || '',
          userId: userData.userId
        };

        localStorage.setItem('hs_user', JSON.stringify(found));

        // توجيه حسب الصلاحية
        // تعديل: طباعة دور المستخدم في وحدة التحكم
        console.log('Found user role:', found.role); //
        console.log('Redirecting user role:', found.role);
        setTimeout(function() {
          if (found.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            // تعديل: استخدام مسار مطلق
            window.location.href = '/school-pwa/teacher.html'; //
          }
        }, 1200);

      } catch (error) {
        console.error('Error logging in:', error);
        alert('حدث خطأ أثناء تسجيل الدخول. يرجى المحاولة مرة أخرى.');
      }
    });
  </script>
</body>
</html>
