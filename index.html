<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة الدخول الذكية - متوسطة سالم الحسينان</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="images/logo.svg" alt="شعار متوسطة سالم الحسينان" class="logo">
      <h1>بوابة الدخول الذكية</h1>
    </div>
    
    <div class="login-form">
      <h2>تسجيل الدخول</h2>
      <form>
        <div class="input-group">
          <img src="images/icons/user.svg" class="icon">
          <input type="text" placeholder="اسم المستخدم" required>
        </div>
        
        <div class="input-group">
          <img src="images/icons/lock.svg" class="icon">
          <input type="password" placeholder="كلمة المرور" required>
        </div>
        
        <div class="checkbox">
          <input type="checkbox" id="remember">
          <label for="remember">تذكرني</label>
        </div>
        
        <button type="submit">دخول <img src="images/icons/arrow.svg"></button>
      </form>
      
      <div class="links">
        <a href="#">نسيت كلمة المرور؟</a>
        <a href="#">تسجيل حساب جديد</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
