<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link lang="manifest" href="manifest.json">
<title>تسجيل الدخول - المنظومة الرقمية الموحدة</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<script>
// 🧼 الممحاة الرقمية الفورية: كسر وحذف السيرفس وركر والكاش القديم المترمش غصبن عليه
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
            registration.unregister().then(function() { console.log('✓ تم تطهير السيرفس وركر القديم'); });
        }
    });
}
// تنظيف الجلسات المعلقة القديمة لتهيئة السستم على النظافة
if(!localStorage.getItem('hs_clean_reset')) {
    localStorage.clear();
    localStorage.setItem('hs_clean_reset', 'true');
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
:root {
    --primary-color: #1a1a2e;
    --accent-color: #e67e22;
    --bg-light: #f5f6fa;
}
*{margin:0;padding:0;box-sizing:border-box; font-family: 'Cairo', sans-serif;}
body{background: var(--bg-light); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px;}
.login-card{background:#fff; padding:2.5rem 2rem; border-radius:16px; max-width:420px; width:100%; box-shadow:0 10px 25px rgba(0,0,0,0.05); border-top:6px solid var(--primary-color); text-align:center;}
.logo-icon{font-size:50px; color:var(--accent-color); margin-bottom:10px;}
h1{font-size:20px; font-weight:900; color:var(--primary-color); margin-bottom:5px;}
p{font-size:13px; color:#666; margin-bottom:25px; font-weight:600;}
label{display:block; text-align:right; font-weight:700; font-size:13px; margin-bottom:6px; color:var(--primary-color);}
input{width:100%; padding:12px; border:1px solid #dcdde1; border-radius:8px; margin-bottom:15px; text-align:right; font-size:14px; outline:none; font-weight:600;}
input:focus{border-color:var(--accent-color);}
button{background:var(--primary-color); color:#fff; border:none; width:100%; padding:12px; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s;}
button:hover{background:var(--accent-color);}
.footer-text{font-size:11px; color:#aaa; margin-top:25px; font-weight:600;}
</style>
</head>
<body>

<div class="login-card">
    <div class="logo-icon"><i class="bi bi-shield-lock-fill"></i></div>
    <h1>بوابة الدخول الموحدة</h1>
    <p>مدرسة سالم الحسينان المتوسطة للبنين</p>
    
    <form id="login-form" onsubmit="handleSystemLogin(event)">
        <div>
            <label>اسم المستخدم / المسؤول</label>
            <input type="text" id="login-username" placeholder="أدخل اسم المستخدم المعين" required>
        </div>
        <div>
            <label>كلمة المرور الإدارية</label>
            <input type="password" id="login-password" placeholder="أدخل رمز المرور السري" required>
        </div>
        <button type="submit"><i class="bi bi-box-arrow-in-left"></i> دخول آمن للمنظومة</button>
    </form>
    
    <div class="footer-text">المنظومة الرقمية الشاملة المعتمدة © 2026</div>
</div>

<script>
function handleSystemLogin(e) {
    e.preventDefault();
    const user = document.getElementById('login-username').value.trim();
    const pass = document.getElementById('login-password').value.trim();

    if(user && pass) {
        // حفظ البيانات بالصيغة الفولاذية المتوافقة 100% مع صفحة الأدمين الجديدة
        const sessionData = { name: user, role: "مسؤول النظام", loginTime: new Date().getTime() };
        localStorage.setItem('hs_user', JSON.stringify(sessionData));
        
        // التوجيه المباشر والآمن بدون أي حلقات تكرار
        window.location.replace('admin.html');
    } else {
        alert('يرجى إدخال البيانات المطلوبة بشكل صحيح.');
    }
}
</script>

</body>
</html>
