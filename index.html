<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متوسطة سالم الحسينان - نظام إدارة الغياب والحضور</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0e27;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.school-name{text-align:center;padding:2rem 1rem 0.5rem;font-size:28px;font-weight:bold;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.school-sub{text-align:center;color:#888;font-size:14px;margin-bottom:2rem}
.login-container{background:#141832;border-radius:16px;padding:2rem;max-width:480px;width:90%;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.tabs{display:flex;gap:8px;margin-bottom:2rem;background:#0d1025;border-radius:8px;padding:4px}
.tab-btn{flex:1;padding:12px;border:none;background:transparent;color:#888;font-size:15px;cursor:pointer;border-radius:6px;transition:all .3s}
.tab-btn.active{background:#1a1f3a;color:#fff}
.welcome{text-align:center;margin-bottom:1.5rem}
.welcome h2{font-size:22px;margin-bottom:4px}
.welcome p{color:#888;font-size:14px}
.error-msg{background:rgba(220,53,69,.15);border:1px solid rgba(220,53,69,.3);color:#ff6b6b;padding:12px;border-radius:8px;text-align:center;margin-bottom:1rem;display:none;font-size:14px}
.success-msg{background:rgba(40,167,69,.15);border:1px solid rgba(40,167,69,.3);color:#51cf66;padding:12px;border-radius:8px;text-align:center;margin-bottom:1rem;display:none;font-size:14px}
.form-group{margin-bottom:1rem}
.form-group label{display:block;margin-bottom:6px;color:#aaa;font-size:13px}
.input-wrapper{position:relative}
.input-wrapper i{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#555;font-size:18px}
.input-wrapper input{width:100%;padding:14px 44px 14px 14px;background:#0d1025;border:1.5px solid #1e2340;border-radius:8px;color:#fff;font-size:16px;direction:ltr;text-align:left;transition:border .3s}
.input-wrapper input:focus{outline:none;border-color:#667eea}
.input-wrapper input.error{border-color:#dc3545}
.toggle-pass{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:18px}
.remember{display:flex;align-items:center;gap:8px;margin:1rem 0;font-size:14px;color:#888}
.remember input{width:18px;height:18px}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;font-size:16px;font-weight:bold;border-radius:8px;cursor:pointer;transition:opacity .3s;display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.spinner{width:20px;height:20px;border:2px solid transparent;border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:2rem;color:#555;font-size:13px;margin-top:auto}
</style>
</head>
<body>

<h1 class="school-name">متوسطة سالم الحسينان</h1>
<p class="school-sub">نظام إدارة الغياب والحضور</p>

<div class="login-container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchLoginTab('staff')">🏫 موظفو المدرسة</button>
    <button class="tab-btn" onclick="switchLoginTab('parent')">👨‍👦 ولي الأمر</button>
  </div>
  
  <!-- دخول الموظفين -->
  <div id="staff-login">
    <div class="welcome">
      <h2>مرحباً بك 👋</h2>
      <p>سجّل دخولك للوصول إلى النظام</p>
    </div>
    
    <div class="error-msg" id="staff-error"></div>
    <div class="success-msg" id="staff-success"></div>
    
    <div class="form-group">
      <label for="staff-id">رقم المستخدم</label>
      <div class="input-wrapper">
        <i>🪪</i>
        <input type="text" id="staff-id" placeholder="أدخل رقم المستخدم" autocomplete="off">
      </div>
    </div>
    
    <div class="form-group">
      <label for="staff-pass">كلمة المرور</label>
      <div class="input-wrapper">
        <i>🔒</i>
        <input type="text" id="staff-pass" placeholder="أدخل كلمة المرور" autocomplete="off" style="-webkit-text-security:disc">
        <button class="toggle-pass" onclick="togglePassword('staff-pass',this)">👁️</button>
      </div>
    </div>
    
    <label class="remember">
      <input type="checkbox" id="staff-remember"> تذكرني
    </label>
    
    <button class="login-btn" id="staff-btn" onclick="loginStaff()">
      <span>تسجيل الدخول</span>
      <span>←</span>
      <div class="spinner" id="staff-spinner"></div>
    </button>
  </div>
  
  <!-- دخول ولي الأمر -->
  <div id="parent-login" style="display:none">
    <div class="welcome">
      <h2>مرحباً بولي الأمر 👨‍👦</h2>
      <p>هذه الخدمة قيد التطوير</p>
    </div>
    <div style="text-align:center;padding:2rem;color:#888">
      <p style="font-size:48px;margin-bottom:1rem">🚧</p>
      <p>بوابة ولي الأمر ستكون متاحة قريباً</p>
    </div>
  </div>
</div>

<div class="footer">متوسطة سالم الحسينان © 2026</div>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import {getFirestore,collection,getDocs} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const app=initializeApp({apiKey:"AIzaSyDEA77qGfSK7w5rYynyzP9-mvD13rRT0tU",authDomain:"hosainan-school.firebaseapp.com",projectId:"hosainan-school",storageBucket:"hosainan-school.firebasestorage.app",messagingSenderId:"264264994076",appId:"1:264264994076:web:1a87730b7d3c684bdf3ed9"});
const db=getFirestore(app);

// تحقق من تذكرني
var saved=localStorage.getItem('hs_saved_user');
if(saved){
  try{
    var u=JSON.parse(saved);
    document.getElementById('staff-id').value=u.id||'';
    document.getElementById('staff-pass').value=u.pass||'';
    document.getElementById('staff-remember').checked=true;
  }catch(e){}
}

window.switchLoginTab=function(tab){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  document.getElementById('staff-login').style.display=tab==='staff'?'block':'none';
  document.getElementById('parent-login').style.display=tab==='parent'?'block':'none';
};

window.togglePassword=function(id,btn){
  var inp=document.getElementById(id);
  if(inp.style.webkitTextSecurity==='disc'||inp.style.webkitTextSecurity===''){
    inp.style.webkitTextSecurity='none';btn.textContent='🙈';
  }else{
    inp.style.webkitTextSecurity='disc';btn.textContent='👁️';
  }
};

window.loginStaff=async function(){
  var userId=document.getElementById('staff-id').value.trim();
  var pass=document.getElementById('staff-pass').value.trim();
  var errorEl=document.getElementById('staff-error');
  var successEl=document.getElementById('staff-success');
  var btn=document.getElementById('staff-btn');
  var spinner=document.getElementById('staff-spinner');
  
  errorEl.style.display='none';
  successEl.style.display='none';
  
  if(!userId||!pass){
    errorEl.textContent='⚠️ يرجى إدخال رقم المستخدم وكلمة المرور';
    errorEl.style.display='block';
    return;
  }
  
  btn.disabled=true;
  spinner.style.display='inline-block';
  
  try{
    var snap=await getDocs(collection(db,'users'));
    var found=null;
    
    snap.forEach(function(doc){
      var d=doc.data();
      var uid=String(d.userId||'').trim();
      var pwd=String(d.plainPass||'').trim();
      if(uid===userId && pwd===pass){
        found={id:doc.id,name:d.name||'',role:String(d.role||'').trim().toLowerCase(),classId:d.classId||'',userId:d.userId};
        console.log('Login match found:',found);
      }
    });
    
    if(!found){
      errorEl.textContent='⚠️ رقم المستخدم أو كلمة المرور غير صحيحة';
      errorEl.style.display='block';
      document.getElementById('staff-id').classList.add('error');
      document.getElementById('staff-pass').classList.add('error');
      btn.disabled=false;
      spinner.style.display='none';
      return;
    }
    
    // حفظ تذكرني
    if(document.getElementById('staff-remember').checked){
      localStorage.setItem('hs_saved_user',JSON.stringify({id:userId,pass:pass}));
    }else{
      localStorage.removeItem('hs_saved_user');
    }
    
    // حفظ بيانات المستخدم
    localStorage.setItem('hs_user',JSON.stringify(found));
    
    successEl.textContent='✅ تم تسجيل الدخول بنجاح! مرحباً '+found.name;
    successEl.style.display='block';
    btn.disabled=false;
    spinner.style.display='none';
    
    // توجيه حسب الصلاحية - محاولات متعددة
    var targetPage=found.role==='admin'?'admin.html':'teacher.html';
    console.log('Redirecting to:',targetPage,'Role:',found.role);
    
    // حفظ الهدف في sessionStorage
    sessionStorage.setItem('hs_redirect',targetPage);
    
    // محاولة أولى
    setTimeout(function(){window.location.replace(targetPage)},800);
    // محاولة ثانية احتياطية
    setTimeout(function(){if(window.location.href.indexOf('index.html')!==-1||window.location.pathname==='/school-pwa/'||window.location.pathname==='/school-pwa/index.html'){window.location.replace(targetPage)}},2500);
    
  }catch(e){
    errorEl.textContent='⚠️ خطأ في الاتصال: '+e.message;
    errorEl.style.display='block';
    btn.disabled=false;
    spinner.style.display='none';
  }
};

// تحقق من redirect معلّق
var pendingRedirect=sessionStorage.getItem('hs_redirect');
var hasUser=localStorage.getItem('hs_user');
if(pendingRedirect&&hasUser){
  sessionStorage.removeItem('hs_redirect');
  window.location.replace(pendingRedirect);
}

// دخول بـ Enter
document.getElementById('staff-pass').addEventListener('keypress',function(e){
  if(e.key==='Enter')window.loginStaff();
});
document.getElementById('staff-id').addEventListener('keypress',function(e){
  if(e.key==='Enter')document.getElementById('staff-pass').focus();
});
document.getElementById('staff-id').addEventListener('input',function(){this.classList.remove('error')});
document.getElementById('staff-pass').addEventListener('input',function(){this.classList.remove('error')});
</script>
</body>
</html>
