<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link class="apple-touch-icon" href="./logo.png">
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<title>بوابة الدخول الموحدة - مدرسة سالم الحسينان</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root {
    --primary-color: #1a1a2e; --hover-color: #e67e22; --bg-light: #f4f6f9;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
body { background: var(--bg-light); display: flex; align-items: center; justify-content: center; min-height: 100vh; direction: rtl; padding: 15px; }

.login-container { max-width: 420px; width: 100%; background: #fff; padding: 35px 25px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #eef2f5; text-align: center; }
.school-logo { width: 85px; height: 85px; margin-bottom: 15px; }
.login-container h1 { font-size: 16px; font-weight: 900; color: var(--primary-color); margin-bottom: 5px; }
.login-container p { font-size: 12px; color: #666; font-weight: bold; margin-bottom: 25px; }

.form-group { text-align: right; margin-bottom: 18px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; color: #444; margin-bottom: 6px; }
.form-group input { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-weight: 600; font-size: 13px; transition: 0.2s; text-align: right; }
.form-group input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(26,26,46,0.05); }

.btn-login { width: 100%; background: var(--primary-color); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: 900; font-size: 14px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
.btn-login:hover { background: var(--hover-color); }

.footer-text { font-size: 10px; color: #999; margin-top: 25px; font-weight: bold; }
</style>
</head>
<body>

<div class="login-container">
    <img src="./logo.png" alt="شعّار المدرسة" class="school-logo" onerror="this.src='https://placehold.co/100'">
    <h1>المنظومة الرقمية الشاملة للمنشأة</h1>
    <p>وزارة التربية - مدرسة سالم الحسينان المتوسطة للبنين</p>
    
    <form id="main-login-form" onsubmit="window.handleSystemLoginLive(event)">
        <div class="form-group">
            <label><i class="bi bi-person-badge"></i> الرقم الوظيفي / معرف المستخدم (User ID):</label>
            <input type="text" id="txt-login-id" placeholder="أدخل رقم المستخدم الخاص بك" required>
        </div>
        
        <div class="form-group">
            <label><i class="bi bi-lock-fill"></i> كلمة المرور السرية (Password):</label>
            <input type="password" id="txt-login-pass" placeholder="أدخل كلمة المرور" required>
        </div>
        
        <button type="submit" id="btn-submit" class="btn-login"><i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة</button>
    </form>
    
    <div class="footer-text">نظام حماية البيانات السحابي الموحد للمدرسة © 2026</div>
</div>

<script type="module">
import { db } from './js/firebase-config.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

window.handleSystemLoginLive = async function(e) {
    e.preventDefault();
    const userId = document.getElementById('txt-login-id').value.trim();
    const userPass = document.getElementById('txt-login-pass').value.trim();
    const submitBtn = document.getElementById('btn-submit');

    submitBtn.disabled = true;
    submitBtn.innerHTML = `<i class="bi bi-hourglass-split"></i> جاري فحص سجلات الحماية والاتصال...`;

    try {
        // فحص وثيقة المستخدم مباشرة بداخل كولكشن المستخدمين الموحد
        const userDocRef = doc(db, 'users', userId);
        const docSnap = await getDoc(userDocRef);

        if (!docSnap.exists()) {
            alert("🔒 خطأ: معرف المستخدم غير مسجل بالنظام السحابي للمدرسة.");
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة`;
            return;
        }

        const userData = docSnap.data();

        // مطابقة كلمة المرور المدخلة نصياً
        if (userData.plainPass !== userPass) {
            alert("🔒 خطأ: كلمة المرور المدخلة غير صحيحة، يرجى إعادة المحاولة.");
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة`;
            return;
        }

        // حفظ جلسة العمل الحالية في الجهاز المضيف
        localStorage.setItem('hs_user', JSON.stringify({
            userId: userData.userId || userId,
            name: userData.name || "عضو المنظومة",
            role: userData.role
        }));

        // 🚀 محرك التوجيه الإداري المطور والمفصل بالكامل لرتبة الأخصائي
        const administrativeRoles = ['admin', 'assistant_manager', 'wing_supervisor', 'guard'];

        if (userData.role === 'teacher') {
            window.location.replace('teacher.html');
        } else if (userData.role === 'social_worker') {
            // تحويل الأخصائي مباشرة إلى صفحته المستقلة الجديدة الملوكية والأزرار الكبيرة
            window.location.replace('social.html');
        } else if (administrativeRoles.includes(userData.role)) {
            window.location.replace('admin.html');
        } else {
            alert("🔒 خطأ وظيفي: هذا الحساب لا يمتلك رتبة صلاحيات معتمدة داخل المنظومة.");
            localStorage.removeItem('hs_user');
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة`;
        }

    } catch (err) {
        alert("❌ فشل الاتصال بالسيرفر المركزي: " + err.message);
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة`;
    }
};
</script>
</body>
</html>
