<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link class="apple-touch-icon" href="./logo.png">
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<title>تسجيل الدخول - المنظومة الرقمية السحابية</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght=400;600;700;900&display=swap');
:root {
    --primary-color: #1a1a2e; --hover-color: #e67e22; --bg-light: #f4f6f9;
    --success-color: #27ae60; --danger-color: #e74c3c;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
body { 
    background: linear-gradient(135deg, #1a1a2e 0%, #161625 100%); 
    min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; direction: rtl;
}
.login-container {
    max-width: 420px; width: 100%; background: #fff; border-radius: 16px; padding: 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3); border-top: 6px solid var(--hover-color); text-align: right;
}
.login-header { text-align: center; margin-bottom: 25px; }
.login-header i { font-size: 50px; color: var(--primary-color); }
.login-header h2 { font-size: 18px; font-weight: 900; color: var(--primary-color); margin-top: 10px; }
.login-header p { font-size: 12px; color: #666; font-weight: bold; margin-top: 4px; }

label { font-weight: 700; font-size: 12px; color: #4a5568; display: block; margin-bottom: 6px; }
.input-group { position: relative; margin-bottom: 20px; }
.input-group i { position: absolute; top: 14px; right: 12px; color: #a0aec0; font-size: 16px; }
input { 
    width: 100%; padding: 12px 38px 12px 12px; border: 1px solid #cbd5e1; border-radius: 8px; 
    outline: none; font-weight: 700; font-size: 14px; color: var(--primary-color); transition: 0.2s;
}
input:focus { border-color: var(--hover-color); box-shadow: 0 0 0 3px rgba(230,126,34,0.1); }

.btn-login { 
    width: 100%; background: var(--primary-color); color: #fff; border: none; padding: 14px; 
    border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 14px; transition: 0.2s; 
    display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(26,26,46,0.15);
}
.btn-login:hover { background: var(--hover-color); }
.btn-login:disabled { background: #94a3b8; cursor: not-allowed; }

.footer-credits { text-align: center; margin-top: 25px; font-size: 11px; color: #a0aec0; font-weight: bold; }
</style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <i class="bi bi-shield-lock-fill"></i>
        <h2>المنظومة الرقمية المركزية M-SaaS</h2>
        <p>بوابة تسجيل الدخول الموحدة للهيئة التعليمية والإدارية</p>
    </div>

    <form id="global-login-form" onsubmit="window.handleGlobalLoginLive(event)">
        <label>رقم المستخدم / المعرف وظيفياً (User ID):</label>
        <div class="input-group">
            <i class="bi bi-person-fill"></i>
            <input type="text" id="txt-login-id" placeholder="أدخل رقمك الموحد بالمنظومة" required>
        </div>

        <label>كلمة المرور السرية:</label>
        <div class="input-group">
            <i class="bi bi-key-fill"></i>
            <input type="password" id="txt-login-pass" placeholder="أدخل كلمة المرور الخاصة بك" required>
        </div>

        <button type="submit" id="btn-submit-action" class="btn-login">
            <i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة
        </button>
    </form>

    <div class="footer-credits">
        حقوق التطوير محفوظة للمنصة السحابية الموحدة © 2026
    </div>
</div>

<script type="module">
import { db } from './js/firebase-config.js';
import { collection, query, where, getDocs, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

window.handleGlobalLoginLive = async function(e) {
    e.preventDefault();
    
    const inputUserId = document.getElementById('txt-login-id').value.trim();
    const inputPassword = document.getElementById('txt-login-pass').value.trim();
    const submitBtn = document.getElementById('btn-submit-action');

    submitBtn.disabled = true;
    submitBtn.innerHTML = `<i class="bi bi-hourglass-split"></i> جاري فحص الترخيص والأمان...`;

    try {
        // 1. الاستعلام بحقل userId النصي لضمان معمارية تعدد المدارس الآمنة
        const qUser = query(collection(db, 'users'), where('userId', '==', inputUserId));
        const userSnap = await getDocs(qUser);

        if (userSnap.empty) {
            alert("❌ اسم المستخدم غير مسجل بالنظام السحابي.");
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة`;
            return;
        }

        const userDoc = userSnap.docs[0];
        const userData = userDoc.data();

        // 2. التحقق من تطابق كلمة المرور السرية
        if (userData.plainPass !== inputPassword) {
            alert("❌ كلمة المرور غير صحيحة، يرجى المحاولة مرة أخرى.");
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة`;
            return;
        }

        // 3. التحقق من وجود ربط أمني للمدرسة
        const schoolId = userData.schoolId;
        if (!schoolId) {
            alert("❌ خطأ حرج: هذا الحساب غير مرتبط بأي منشأة تعليمية مسجلة.");
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة`;
            return;
        }

        // 4. 🚨 رادار فحص حالة اشتراك المدرسة وصلاحية ترخيص البث
        const schoolDoc = await getDoc(doc(db, 'schools', schoolId));
        if (!schoolDoc.exists()) {
            alert("❌ خطأ: المنشأة التعليمية التابع لها هذا الحساب غير مسجلة بالسيرفر.");
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة`;
            return;
        }

        const schoolData = schoolDoc.data();

        // أ) التحقق من الإيقاف اليدوي المؤقت من قبلك بوعلي
        if (schoolData.status === 'suspended') {
            alert("⚠️ تم إيقاف اشتراك هذه المدرسة مؤقتاً لانتهاء فترة الترخيص.\nيرجى مراجعة مطور المنظومة (أ. حسين كرم) لإعادة التفعيل.");
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة`;
            return;
        }

        // ب) التحقق التلقائي الذكي من تاريخ انتهاء الصلاحية السنوية
        if (schoolData.subscriptionEnd) {
            const expireDate = new Date(schoolData.subscriptionEnd);
            const today = new Date();
            if (expireDate < today) {
                alert(`⚠️ انتهى ترخيص بث هذه المنشأة تلقائياً بتاريخ: [ ${schoolData.subscriptionEnd} ]\nيرجى مراجعة مطور المنظومة (أ. حسين كرم) لتجديد الاشتراك السنوي.`);
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة`;
                return;
            }
        }

        // 5. ✅ الترخيص سليم! حفظ الجلسة محلياً بالبصمة المدرسية
        localStorage.setItem('hs_user', JSON.stringify({
            userId: userData.userId,
            name: userData.name || "عضو المنظومة",
            role: String(userData.role || '').trim().toLowerCase(),
            schoolId: schoolId,
            classId: userData.classId || ''
        }));

        // 6. التوجيه الآلي حسب رتبة الصلاحية المعتمدة
        const role = String(userData.role || '').trim().toLowerCase();
        if (role === 'teacher') {
            window.location.replace('teacher.html');
        } else {
            window.location.replace('admin.html');
        }

    } catch (err) {
        alert("❌ خطأ في الاتصال بالسيرفر السحابي: " + err.message);
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="bi bi-box-arrow-in-left"></i> تسجيل الدخول للمنظومة`;
    }
};
</script>
</body>
</html>
