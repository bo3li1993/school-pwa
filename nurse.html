<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>بوابة الممرض - المنظومة الرقمية</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#0b2545">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link class="apple-touch-icon" href="./logo.png">
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0b2545; --sky:#1a78c2; --ice:#eaf4fd; --gold:#d4920a;
  --white:#fff; --off:#f8f9fc; --line:#e5e7eb; --text:#111827; --mid:#6b7280;
  --green:#059669; --red:#dc2626;
  --teal:#0891b2; --teal-light:#e0f7fa;
}
body { background:var(--off); }

.header-nav {
  background:var(--teal); color:#fff;
  padding:14px 20px;
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:4px solid var(--gold);
  position:sticky; top:0; z-index:100;
}
.header-nav h1 { font-size:15px; font-weight:900; display:flex; align-items:center; gap:8px; }
.header-nav p  { font-size:11px; opacity:.8; font-weight:600; margin-top:2px; }
.header-actions { display:flex; gap:8px; }
.btn-header { border:none; padding:8px 14px; font-weight:700; border-radius:6px; cursor:pointer; font-size:13px; font-family:'Cairo',sans-serif; display:inline-flex; align-items:center; gap:6px; }

.workspace { max-width:1000px; margin:0 auto; padding:16px; padding-bottom:80px; }

.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.stat-box { background:var(--white); border-radius:12px; padding:16px; text-align:center; border:1px solid var(--line); }
.stat-box .num { font-size:28px; font-weight:900; line-height:1; }
.stat-box .lbl { font-size:11px; color:var(--mid); font-weight:700; margin-top:4px; }

.card { background:var(--white); border:1px solid var(--line); border-radius:14px; padding:20px; margin-bottom:16px; }
.card h2 { font-size:15px; font-weight:900; color:var(--navy); margin-bottom:14px; display:flex; align-items:center; gap:8px; border-bottom:2px solid var(--off); padding-bottom:10px; }

.form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label { font-size:12px; font-weight:800; color:var(--text); }
.form-input { padding:10px 12px; border:1.5px solid var(--line); border-radius:8px; font-family:'Cairo',sans-serif; font-size:14px; font-weight:600; outline:none; transition:border-color .2s; }
.form-input:focus { border-color:var(--teal); }

.btn-submit { width:100%; padding:13px; background:var(--teal); color:#fff; border:none; border-radius:10px; font-family:'Cairo',sans-serif; font-size:14px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:.2s; }
.btn-submit:hover { background:#0670a0; }

.record-card { background:var(--teal-light); border:1px solid rgba(8,145,178,.2); border-radius:10px; padding:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:flex-start; gap:12px; animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.record-info h3 { font-size:14px; font-weight:900; color:var(--navy); margin-bottom:4px; }
.record-info p  { font-size:12px; color:var(--mid); font-weight:600; }
.record-time { font-size:11px; color:var(--teal); font-weight:800; text-align:left; flex-shrink:0; }
.complaint-badge { display:inline-block; background:rgba(8,145,178,.1); color:var(--teal); border:1px solid rgba(8,145,178,.2); padding:3px 10px; border-radius:8px; font-size:11px; font-weight:800; margin-top:4px; }

.btn-exit-student { background:var(--red); color:#fff; border:none; padding:6px 12px; border-radius:6px; font-family:'Cairo',sans-serif; font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0; }
.btn-exit-student:hover { background:#b91c1c; }

/* Bottom Nav */
.bottom-nav { display:none; position:fixed; right:0; left:0; bottom:0; background:var(--white); border-top:1px solid var(--line); z-index:45; padding-bottom:env(safe-area-inset-bottom); }
.bn-item { flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:10px 0 8px; color:var(--mid); font-family:'Cairo',sans-serif; font-size:11px; font-weight:800; cursor:pointer; }
.bn-item i { font-size:22px; width:40px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:10px; transition:.15s; }
.bn-item.active { color:var(--teal); }
.bn-item.active i { background:var(--teal-light); color:var(--teal); }

.tab-view { display:none; }
.tab-view.active { display:block; }

@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast-msg { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); padding:11px 24px; border-radius:12px; font-family:'Cairo',sans-serif; font-size:14px; font-weight:700; z-index:99999; color:#fff; box-shadow:0 4px 16px rgba(0,0,0,.2); animation:toastIn .3s ease; white-space:nowrap; }

/* Responsive */
@media(max-width:768px) {
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .bottom-nav { display:flex; }
  .workspace { padding:12px; padding-bottom:80px; }
  .header-nav { padding:12px 14px; }
  .header-nav h1 { font-size:13px; }
}
@media(max-width:480px) {
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .record-card { flex-direction:column; }
}

/* ══ Dark Mode ══ */
body.dark-mode { background:#161e2e !important; color:#e2e8f0 !important; }
body.dark-mode .header-nav { background:#0f1928 !important; }
body.dark-mode .card { background:#1e2535 !important; border-color:#2a3650 !important; }
body.dark-mode .workspace-container > * { background:#1e2535; }
body.dark-mode input, body.dark-mode select, body.dark-mode textarea {
  background:#1e2535 !important; color:#e2e8f0 !important; border-color:#2a3650 !important;
}
body.dark-mode table th { background:#0f1928 !important; }
body.dark-mode .bottom-nav { background:#1e2535 !important; border-color:#2a3650 !important; }
body.dark-mode .stat-box { background:#1e2535 !important; border-color:#2a3650 !important; }

</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-mark">
    <div class="splash-badge">🏥</div>
    <h1>المنظومة الرقمية</h1>
    <p id="splash-school">بوابة الممرض</p>
  </div>
</div>

<div class="header-nav">
  <div>
    <h1 id="lbl-nurse-title"><i class="bi bi-heart-pulse-fill"></i> بوابة الممرض</h1>
    <p id="lbl-nurse-school">المنظومة الرقمية</p>
  </div>
  <div class="header-actions">
    <button onclick="document.body.classList.toggle('dark-mode');localStorage.setItem('hs_dark_mode',document.body.classList.contains('dark-mode')?'1':'0')"
    style="background:transparent;border:1.5px solid rgba(255,255,255,.3);color:#fff;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:15px"
    title="الوضع الليلي">🌙</button>
    <button class="btn-header" onclick="doLogout()" style="background:var(--red);color:#fff;">
      <i class="bi bi-box-arrow-left"></i> خروج
    </button>
  </div>
</div>

<div class="workspace">

  <!-- إحصائيات اليوم -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="num" id="stat-today" style="color:var(--teal)">—</div>
      <div class="lbl">مراجعات اليوم</div>
    </div>
    <div class="stat-box">
      <div class="num" id="stat-inside" style="color:var(--gold)">—</div>
      <div class="lbl">داخل العيادة</div>
    </div>
    <div class="stat-box">
      <div class="num" id="stat-returned" style="color:var(--green)">—</div>
      <div class="lbl">رجعوا للفصل</div>
    </div>
    <div class="stat-box">
      <div class="num" id="stat-sent-home" style="color:var(--red)">—</div>
      <div class="lbl">أُرسلوا للبيت</div>
    </div>
  </div>

  <!-- تبويب: تسجيل -->
  <div class="tab-view active" id="view-register">
    <div class="card">
      <h2><i class="bi bi-plus-circle-fill" style="color:var(--teal)"></i> تسجيل مراجعة جديدة</h2>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">الفصل</label>
          <select class="form-input" id="nurse-class" onchange="loadStudents(this.value)">
            <option value="">-- اختر الفصل --</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">الطالب</label>
          <select class="form-input" id="nurse-student" disabled>
            <option value="">-- اختر الفصل أولاً --</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">الشكوى / التشخيص</label>
          <select class="form-input" id="nurse-complaint">
            <option value="ارتفاع درجة الحرارة">🌡️ ارتفاع درجة الحرارة</option>
            <option value="صداع وألم بالرأس">🤕 صداع وألم بالرأس</option>
            <option value="ألم بالمعدة ومغص">🤢 ألم بالمعدة</option>
            <option value="إصابة جرح أو كدمة">🏃 جرح / إصابة</option>
            <option value="إعياء عام وإرهاق">💤 إعياء عام</option>
            <option value="ألم بالأسنان">🦷 ألم بالأسنان</option>
            <option value="ضغط دم / دوخة">😵 دوخة / ضغط</option>
            <option value="حساسية أو طفح جلدي">🤧 حساسية</option>
            <option value="أخرى">📋 أخرى</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">الإجراء / العلاج</label>
          <input type="text" class="form-input" id="nurse-treatment" placeholder="مثال: بندول + راحة حصة">
        </div>
        <div class="form-group">
          <label class="form-label">النتيجة</label>
          <select class="form-input" id="nurse-result">
            <option value="داخل العيادة">⏳ داخل العيادة</option>
            <option value="رجع للفصل">✅ رجع للفصل</option>
            <option value="أُرسل للبيت">🏠 أُرسل للبيت</option>
            <option value="تم استدعاء ولي الأمر">📞 استدعاء ولي الأمر</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">ملاحظات إضافية</label>
          <input type="text" class="form-input" id="nurse-notes" placeholder="ملاحظات اختيارية...">
        </div>
      </div>
      <button class="btn-submit" onclick="saveVisit()">
        <i class="bi bi-cloud-upload-fill"></i> حفظ المراجعة الطبية
      </button>
    </div>
  </div>

  <!-- تبويب: اليوم -->
  <div class="tab-view" id="view-today">
    <div class="card">
      <h2><i class="bi bi-calendar-day-fill" style="color:var(--teal)"></i> مراجعات اليوم الحية</h2>
      <div id="today-list">
        <div style="text-align:center;padding:30px;color:var(--mid);font-weight:700">⏳ جاري التحميل...</div>
      </div>
    </div>
  </div>

  <!-- تبويب: الأرشيف -->
  <div class="tab-view" id="view-archive">
    <div class="card">
      <h2><i class="bi bi-archive-fill" style="color:var(--teal)"></i> أرشيف العيادة</h2>
      <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
        <input type="date" id="archive-date-from" class="form-input" style="max-width:160px">
        <input type="date" id="archive-date-to" class="form-input" style="max-width:160px">
        <button onclick="loadArchive()" class="btn-submit" style="width:auto;padding:10px 18px;">
          <i class="bi bi-search"></i> بحث
        </button>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="background:var(--off)">
              <th style="padding:9px;text-align:right;font-weight:900;color:var(--navy);">التاريخ</th>
              <th style="padding:9px;text-align:right;">الطالب</th>
              <th style="padding:9px;text-align:right;">الفصل</th>
              <th style="padding:9px;text-align:right;">الشكوى</th>
              <th style="padding:9px;text-align:right;">النتيجة</th>
            </tr>
          </thead>
          <tbody id="archive-tbody">
            <tr><td colspan="5" style="text-align:center;padding:20px;color:var(--mid);">اختر نطاق التاريخ وابحث</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- تبويب: إعداداتي -->
  <div class="tab-view" id="view-settings">
    <div class="card">
      <h2><i class="bi bi-person-gear" style="color:var(--teal)"></i> بياناتي الشخصية</h2>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">الاسم الكامل</label>
          <input type="text" class="form-input" id="nurse-name">
        </div>
        <div class="form-group">
          <label class="form-label">رقم الهاتف</label>
          <input type="tel" class="form-input" id="nurse-phone">
        </div>
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-input" id="nurse-email">
        </div>
        <div class="form-group">
          <label class="form-label">كلمة مرور جديدة (اختياري)</label>
          <input type="password" class="form-input" id="nurse-pass" placeholder="اتركها فارغة إذا ما تبي تغييرها">
        </div>
      </div>
      <button class="btn-submit" onclick="saveProfile()">
        <i class="bi bi-check-circle-fill"></i> حفظ التعديلات
      </button>
    </div>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="bn-item active" data-view="view-register" onclick="switchView('view-register')">
    <i class="bi bi-plus-circle-fill"></i>تسجيل
  </button>
  <button class="bn-item" data-view="view-today" onclick="switchView('view-today')">
    <i class="bi bi-calendar-day"></i>اليوم
  </button>
  <button class="bn-item" data-view="view-archive" onclick="switchView('view-archive')">
    <i class="bi bi-archive"></i>الأرشيف
  </button>
  <button class="bn-item" data-view="view-settings" onclick="switchView('view-settings')">
    <i class="bi bi-sliders"></i>إعداداتي
  </button>
</div>

<script type="module">
import { db, getActiveSchoolId, getTodayISO, getSchoolClasses } from './js/firebase-config.js';
import { collection, addDoc, getDocs, doc, updateDoc, onSnapshot,
         query, where, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

let currentUser = null;
let todayUnsub = null;

// ══ Toast ══
window.showToast = function(msg, type='success') {
  document.querySelectorAll('.toast-msg').forEach(t=>t.remove());
  const colors = {success:'#059669',error:'#dc2626',info:'#1a78c2',warning:'#d97706'};
  const t = document.createElement('div');
  t.className = 'toast-msg';
  t.style.background = colors[type]||colors.success;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},2500);
};

// ══ Switch View ══
window.switchView = function(viewId) {
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  document.getElementById(viewId)?.classList.add('active');
  document.querySelector(`.bn-item[data-view="${viewId}"]`)?.classList.add('active');
  if(viewId==='view-today') loadTodayLive();
  if(viewId==='view-archive') setDefaultDates();
};

// ══ Init ══
document.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('hs_user');
  if(!saved) { window.location.replace('index.html'); return; }

  currentUser = JSON.parse(saved);
  if(!['nurse','admin','assistant_manager'].includes(currentUser.role)) {
    window.location.replace('index.html'); return;
  }

  document.getElementById('lbl-nurse-title').innerHTML = `<i class="bi bi-heart-pulse-fill"></i> أ. ${currentUser.name||'الممرض'}`;
  document.getElementById('lbl-nurse-school').textContent = currentUser.schoolName||'المنظومة الرقمية';
  document.getElementById('splash-school').textContent = currentUser.schoolName||'';

  // تحميل الفصول
  const classes = await getSchoolClasses(db, getActiveSchoolId());
  const sel = document.getElementById('nurse-class');
  sel.innerHTML = '<option value="">-- اختر الفصل --</option>' +
    classes.map(c=>`<option value="${c}">${c}</option>`).join('');

  // إحصائيات اليوم (live)
  loadStats();

  // تحميل بيانات الملف الشخصي
  loadProfile();

  document.getElementById('splash').classList.add('hide');
});

// ══ تحميل الطلاب ══
window.loadStudents = async function(classId) {
  const sel = document.getElementById('nurse-student');
  if(!classId) { sel.innerHTML='<option value="">-- اختر الفصل أولاً --</option>'; sel.disabled=true; return; }
  sel.innerHTML='<option value="">⏳ جاري التحميل...</option>';
  sel.disabled=true;
  try {
    const snap = await getDocs(query(collection(db,'students'),
      where('schoolId','==',getActiveSchoolId()), where('classId','==',classId)));
    const names=[];
    snap.forEach(d=>{ if(d.data().name) names.push(d.data().name.trim()); });
    names.sort((a,b)=>a.localeCompare(b,'ar'));
    sel.innerHTML='<option value="">-- اختر الطالب --</option>'+names.map(n=>`<option value="${n}">${n}</option>`).join('');
    sel.disabled=false;
  } catch(e) { sel.innerHTML='<option value="">❌ خطأ</option>'; }
};

// ══ حفظ المراجعة ══
window.saveVisit = async function() {
  const classId   = document.getElementById('nurse-class').value;
  const student   = document.getElementById('nurse-student').value;
  const complaint = document.getElementById('nurse-complaint').value;
  const treatment = document.getElementById('nurse-treatment').value.trim();
  const result    = document.getElementById('nurse-result').value;
  const notes     = document.getElementById('nurse-notes').value.trim();

  if(!classId||!student) { showToast('اختر الفصل والطالب','error'); return; }

  const now = new Date();
  const timeStr = now.toLocaleTimeString('ar-KW',{hour:'2-digit',minute:'2-digit'});

  try {
    await addDoc(collection(db,'clinic'), {
      schoolId:    getActiveSchoolId(),
      classId,
      studentName: student,
      complaint,
      treatment:   treatment||'—',
      result,
      notes,
      date:        getTodayISO(),
      timeStr,
      nurseName:   currentUser.name||'',
      status:      result==='داخل العيادة'?'active':'done',
      createdAt:   serverTimestamp()
    });

    showToast(`✅ تم تسجيل مراجعة ${student}`);
    document.getElementById('nurse-class').value='';
    document.getElementById('nurse-student').innerHTML='<option value="">-- اختر الفصل أولاً --</option>';
    document.getElementById('nurse-student').disabled=true;
    document.getElementById('nurse-treatment').value='';
    document.getElementById('nurse-notes').value='';
  } catch(e) { showToast('❌ '+e.message,'error'); }
};

// ══ إحصائيات اليوم ══
function loadStats() {
  const schoolId = getActiveSchoolId();
  const today = getTodayISO();
  const q = query(collection(db,'clinic'), where('schoolId','==',schoolId), where('date','==',today));
  onSnapshot(q, snap=>{
    let inside=0, returned=0, sentHome=0;
    snap.forEach(d=>{
      const r=d.data().result||'';
      if(r==='داخل العيادة') inside++;
      else if(r==='رجع للفصل') returned++;
      else if(r==='أُرسل للبيت') sentHome++;
    });
    document.getElementById('stat-today').textContent=snap.size;
    document.getElementById('stat-inside').textContent=inside;
    document.getElementById('stat-returned').textContent=returned;
    document.getElementById('stat-sent-home').textContent=sentHome;
  });
}

// ══ مراجعات اليوم ══
function loadTodayLive() {
  if(todayUnsub) todayUnsub();
  const schoolId=getActiveSchoolId();
  const today=getTodayISO();
  const q=query(collection(db,'clinic'), where('schoolId','==',schoolId), where('date','==',today));
  todayUnsub=onSnapshot(q, snap=>{
    const list=document.getElementById('today-list');
    if(snap.empty){
      list.innerHTML='<div style="text-align:center;padding:30px;color:var(--mid);font-weight:700">لا توجد مراجعات اليوم بعد</div>';
      return;
    }
    const docs=[...snap.docs].sort((a,b)=>(b.data().createdAt?.seconds||0)-(a.data().createdAt?.seconds||0));
    list.innerHTML=docs.map(d=>{
      const v=d.data();
      const isDone=v.status==='done';
      return `
      <div class="record-card" style="${isDone?'opacity:.6':''}">
        <div class="record-info">
          <h3>👤 ${v.studentName} — ${v.classId}</h3>
          <span class="complaint-badge">${v.complaint}</span>
          <p style="margin-top:6px">💊 ${v.treatment} | <b>${v.result}</b></p>
          ${v.notes?`<p style="color:var(--mid);font-size:11px;margin-top:3px">📝 ${v.notes}</p>`:''}
        </div>
        <div style="text-align:left;flex-shrink:0;">
          <div class="record-time">${v.timeStr||''}</div>
          ${v.status==='active'?`
          <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">
            <button class="btn-exit-student" onclick="updateResult('${d.id}','رجع للفصل')" style="background:var(--green)">✅ رجع الفصل</button>
            <button class="btn-exit-student" onclick="updateResult('${d.id}','أُرسل للبيت')">🏠 أُرسل للبيت</button>
          </div>`:'<div style="color:var(--green);font-weight:700;font-size:12px;margin-top:8px">✔ مكتمل</div>'}
        </div>
      </div>`;
    }).join('');
  });
}

// ══ تحديث نتيجة ══
window.updateResult = async function(docId, newResult) {
  try {
    await updateDoc(doc(db,'clinic',docId), { result:newResult, status:'done' });
    showToast(`✅ تم تحديث الحالة: ${newResult}`);
  } catch(e){ showToast('❌ '+e.message,'error'); }
};

// ══ الأرشيف ══
function setDefaultDates() {
  const today=getTodayISO();
  const weekAgo=new Date(); weekAgo.setDate(weekAgo.getDate()-7);
  document.getElementById('archive-date-from').value=weekAgo.toISOString().slice(0,10);
  document.getElementById('archive-date-to').value=today;
}

window.loadArchive = async function() {
  const from=document.getElementById('archive-date-from').value;
  const to=document.getElementById('archive-date-to').value;
  if(!from||!to){ showToast('اختر نطاق التاريخ','info'); return; }
  const tbody=document.getElementById('archive-tbody');
  tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:20px">⏳ جاري البحث...</td></tr>';
  try {
    const snap=await getDocs(query(collection(db,'clinic'),
      where('schoolId','==',getActiveSchoolId()),
      where('date','>=',from), where('date','<=',to)));
    if(snap.empty){ tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--mid)">لا توجد سجلات</td></tr>'; return; }
    const docs=[...snap.docs].sort((a,b)=>b.data().date.localeCompare(a.data().date));
    tbody.innerHTML=docs.map(d=>{
      const v=d.data();
      return `<tr>
        <td style="padding:8px;border-bottom:1px solid var(--line)">${v.date||'—'} ${v.timeStr?'('+v.timeStr+')':''}</td>
        <td style="padding:8px;border-bottom:1px solid var(--line);font-weight:700">${v.studentName||'—'}</td>
        <td style="padding:8px;border-bottom:1px solid var(--line)">${v.classId||'—'}</td>
        <td style="padding:8px;border-bottom:1px solid var(--line)">${v.complaint||'—'}</td>
        <td style="padding:8px;border-bottom:1px solid var(--line);font-weight:700;color:var(--green)">${v.result||'—'}</td>
      </tr>`;
    }).join('');
  } catch(e){ tbody.innerHTML=`<tr><td colspan="5" style="text-align:center;color:red;padding:20px">❌ ${e.message}</td></tr>`; }
};

// ══ ملف شخصي ══
async function loadProfile() {
  try {
    const snap=await getDocs(query(collection(db,'users'),
      where('schoolId','==',getActiveSchoolId()), where('userId','==',currentUser.userId)));
    if(snap.empty) return;
    const d=snap.docs[0].data();
    document.getElementById('nurse-name').value=d.name||'';
    document.getElementById('nurse-phone').value=d.phone||'';
    document.getElementById('nurse-email').value=d.email||'';
  } catch(e){}
}

window.saveProfile = async function() {
  const name=document.getElementById('nurse-name').value.trim();
  const phone=document.getElementById('nurse-phone').value.trim();
  const email=document.getElementById('nurse-email').value.trim();
  const pass=document.getElementById('nurse-pass').value.trim();
  if(!name){ showToast('الاسم مطلوب','error'); return; }
  try {
    const snap=await getDocs(query(collection(db,'users'),
      where('schoolId','==',getActiveSchoolId()), where('userId','==',currentUser.userId)));
    if(snap.empty){ showToast('⚠️ تعذر إيجاد حسابك','error'); return; }
    await updateDoc(snap.docs[0].ref,{name,phone,email});
    if(pass){
      try {
        const {getFunctions,httpsCallable}=await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js');
        const fns=getFunctions();
        await httpsCallable(fns,'resetUserPassword')({userDocId:snap.docs[0].id,newPassword:pass});
      } catch(pe){ showToast('⚠️ تم الحفظ لكن تعذر تغيير كلمة المرور','warning'); }
    }
    currentUser.name=name;
    localStorage.setItem('hs_user',JSON.stringify(currentUser));
    document.getElementById('lbl-nurse-title').innerHTML=`<i class="bi bi-heart-pulse-fill"></i> أ. ${name}`;
    document.getElementById('nurse-pass').value='';
    showToast('✅ تم حفظ بياناتك بنجاح');
  } catch(e){ showToast('❌ '+e.message,'error'); }
};

window.doLogout=function(){
  localStorage.removeItem('hs_user');
  localStorage.removeItem('hs_custom_token');
  window.location.replace('index.html');
};
