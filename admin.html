<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الإدارة - متوسطة سالم الحسينان</title>
  <style>
    body { font-family: sans-serif; background: #f4f7f6; margin: 0; }
    .nav { background: #1a1a2e; padding: 15px; display: flex; gap: 10px; color: white; }
    .nav button { background: #667eea; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    .content { padding: 20px; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
  </style>
</head>
<body>

  <div class="nav">
    <button onclick="showTab('today')">📊 إحصائيات</button>
    <button onclick="showTab('visits')">📋 الزيارات</button>
    <button onclick="window.open('tv.html', '_blank')" style="background:#dc3545">📺 غرفة العمليات</button>
    <button onclick="logout()" style="background:#6c757d">خروج</button>
  </div>

  <div class="content">
    <div id="today" class="tab-pane active">
      <h2>إحصائيات اليوم</h2>
      <div id="stats">جاري تحميل البيانات...</div>
    </div>
    <div id="visits" class="tab-pane">
      <h2>سجل الزيارات الصفية</h2>
      <div id="visits-list">جاري تحميل الزيارات...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const app = initializeApp({apiKey:"AIzaSyDEA77qGfSK7w5rYynyzP9-mvD13rRT0tU",authDomain:"hosainan-school.firebaseapp.com",projectId:"hosainan-school",storageBucket:"hosainan-school.firebasestorage.app",messagingSenderId:"264264994076",appId:"1:264264994076:web:1a87730b7d3c684bdf3ed9"});
    const db = getFirestore(app);

    // وظيفة التنقل بين التبويبات
    window.showTab = (id) => {
      document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    };

    // وظيفة الخروج
    window.logout = () => {
      localStorage.removeItem('hs_user');
      window.location.replace('index.html');
    };

    // تحميل البيانات الأساسية
    async function loadData() {
      // إحصائيات اليوم
      const attSnap = await getDocs(collection(db, 'attendance'));
      document.getElementById('stats').innerHTML = `عدد سجلات الغياب المسجلة: ${attSnap.size}`;

      // تحميل الزيارات
      const visitSnap = await getDocs(collection(db, 'visits'));
      let vHtml = '<table border="1"><tr><th>المعلم</th><th>القسم</th><th>التقييم</th></tr>';
      visitSnap.forEach(doc => {
        let v = doc.data();
        vHtml += `<tr><td>${v.teacherName}</td><td>${v.dept}</td><td>${v.rating}</td></tr>`;
      });
      document.getElementById('visits-list').innerHTML = vHtml + '</table>';
    }

    loadData();
  </script>
</body>
</html>
