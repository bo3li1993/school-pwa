<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المدير - متوسطة سالم الحسينان</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#f5f5f5;color:#333;line-height:1.6}
    .header{background:#1a1a2e;color:#fff;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
    .header-right{display:flex;gap:12px;align-items:center}
    .tabs{background:#fff;display:flex;gap:4px;padding:8px;overflow-x:auto;border-bottom:1px solid #ddd}
    .tab{padding:8px 16px;border:none;background:transparent;cursor:pointer;font-size:14px;white-space:nowrap;border-radius:4px}
    .tab.active{background:#1a1a2e;color:#fff}
    .content{max-width:1200px;margin:0 auto;padding:1.5rem}
    .card{background:#fff;border-radius:8px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
    .modal-content{background:#fff;border-radius:8px;padding:2rem;max-width:800px;width:90%}
    .hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>أهلاً، <span id="user-name">المدير</span></h1>
  </div>
  <div class="header-right">
    <button onclick="window.open('tv.html', '_blank')" style="background:#dc3545">📺 غرفة العمليات</button>
    <button onclick="logout()" style="background:#6c757d">خروج</button>
  </div>
</div>

<div class="tabs" id="tabs-bar">
  <button class="tab active" onclick="switchTab(this, 'today')">📊 اليوم</button>
  <button class="tab" onclick="switchTab(this, 'visits')">🏫 الزيارات</button>
  <button class="tab" onclick="switchTab(this, 'users')">👥 المستخدمون</button>
</div>

<div class="content">
  <div id="today" class="tab-pane">
    <div class="card"><h2>إحصائيات اليوم</h2><div id="stats-area">جاري التحميل...</div></div>
  </div>
  <div id="visits" class="tab-pane hidden">
    <div class="card"><h2>سجل الزيارات</h2><div id="visits-area">جاري التحميل...</div></div>
  </div>
  <div id="users" class="tab-pane hidden">
    <div class="card"><h2>المستخدمون</h2><div id="users-area">جاري التحميل...</div></div>
  </div>
</div>

<script type="module">
    import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import {getFirestore, collection, getDocs} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const app = initializeApp({apiKey:"AIzaSyDEA77qGfSK7w5rYynyzP9-mvD13rRT0tU",authDomain:"hosainan-school.firebaseapp.com",projectId:"hosainan-school",storageBucket:"hosainan-school.firebasestorage.app",messagingSenderId:"264264994076",appId:"1:264264994076:web:1a87730b7d3c684bdf3ed9"});
    const db = getFirestore(app);

    // ربط الدوال بـ window عشان الأزرار تشوفها
    window.logout = () => {
        localStorage.removeItem('hs_user');
        window.location.href = 'index.html';
    };

    window.switchTab = (btn, id) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    // تحميل البيانات
    async function loadAllData() {
        try {
            const user = JSON.parse(localStorage.getItem('hs_user'));
            document.getElementById('user-name').textContent = user.name;

            // إحصائيات
            const att = await getDocs(collection(db, 'attendance'));
            document.getElementById('stats-area').innerHTML = `إجمالي سجلات الغياب: <b>${att.size}</b>`;

            // زيارات
            const vis = await getDocs(collection(db, 'visits'));
            let vHtml = '<table border="1" style="width:100%;border-collapse:collapse;"><tr><th>المعلم</th><th>القسم</th></tr>';
            vis.forEach(doc => { let v = doc.data(); vHtml += `<tr><td>${v.teacherName}</td><td>${v.dept}</td></tr>`; });
            document.getElementById('visits-area').innerHTML = vHtml + '</table>';
        } catch(e) { console.error(e); }
    }

    loadAllData();
</script>
</body>
</html>
