<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المنظومة الرقمية - لوحة الإدارة الحصينة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --primary-color: #1a1a2e; --hover-color: #e67e22; --danger-color: #e74c3c; }
        body { font-family: 'Cairo', sans-serif; background: #f4f6f9; display: flex; min-height: 100vh; margin: 0; }
        .sidebar { width: 280px; background: #161625; color: #fff; height: 100vh; position: fixed; right: 0; }
        .main-content { margin-right: 280px; width: 100%; }
        .top-navbar { background: #fff; padding: 15px 25px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .menu-item { padding: 15px; cursor: pointer; color: #b2bec3; font-weight: 700; }
        .menu-item:hover, .menu-item.active { color: #fff; background: #2c2c3e; border-right: 4px solid var(--hover-color); }
        button { cursor: pointer; padding: 8px 16px; border-radius: 6px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding:20px; font-weight:900; border-bottom:1px solid #2c2c3e;">مدرسة سالم الحسينان</div>
        <ul style="list-style:none;">
            <li class="menu-item active" onclick="window.switchTab('tab-index')"><i class="bi bi-graph-up"></i> 📊 المؤشرات اليومية</li>
            <li class="menu-item" onclick="window.switchTab('tab-student')"><i class="bi bi-person"></i> 👤 ملف الطالب</li>
        </ul>
    </div>
    <div class="main-content">
        <div class="top-navbar">
            <div>مرحباً: <b id="lbl-admin-name">..</b></div>
            <button onclick="logout()" style="background:var(--danger-color); color:#fff;"><i class="bi bi-box-arrow-left"></i> خروج آمن</button>
        </div>
        <div id="tab-index" class="tab-content active"></div>
        <div id="tab-student" class="tab-content"></div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        
        // 1. القفل الأمني الجديد: حظر الحارس وتوجيهه لصفحته المخصصة
        (function() {
            const saved = localStorage.getItem('hs_user');
            if(!saved) { window.location.replace('index.html'); return; }
            try {
                const u = JSON.parse(saved);
                const roleClean = String(u.role||'').trim().toLowerCase();
                
                if(roleClean === 'guard') {
                    window.location.replace('guard.html');
                    return;
                }

                const allowed = ['admin', 'assistant_manager', 'wing_supervisor', 'social_worker'];
                if(!allowed.includes(roleClean)) {
                    alert('🔒 الوصول مرفوض — هذه اللوحة للإدارة العليا فقط');
                    window.location.replace('index.html');
                    return;
                }
                document.getElementById('lbl-admin-name').textContent = u.name;
            } catch(e) { window.location.replace('index.html'); }
        })();

        window.logout = () => { localStorage.removeItem('hs_user'); window.location.replace('index.html'); };

        // 2. محرك بث الغياب الذكي المجاني عبر الواتساب
        window.sendAbsenceViaWhatsApp = function(classId, absentList, date) {
            const user = JSON.parse(localStorage.getItem('hs_user'));
            const schoolName = user?.schoolName || 'المدرسة';
            const msg = `*إشعار غياب رسمي*\n*${schoolName}*\n*الفصل:* ${classId} | *التاريخ:* ${date}\n\n` +
                        `*الغائبون (${absentList.length}):*\n` +
                        absentList.map((n,i) => `${i+1}. ${n}`).join('\n') +
                        `\n\n_المنظومة الرقمية الشاملة_`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.switchTab = async function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            const moduleMap = {
                'tab-index': { file: './js/modules/today.js', init: 'initTodayModule' },
                'tab-student': { file: './js/modules/student.js', init: 'initStudentModule' }
            };
            if(moduleMap[tabId]) {
                const mod = await import(moduleMap[tabId].file);
                if(mod[moduleMap[tabId].init]) mod[moduleMap[tabId].init]();
            }
        };
    </script>
</body>
</html>
