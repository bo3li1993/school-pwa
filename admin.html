<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المدير - متوسطة سالم الحسينان</title>
<style>
/* ... (نفس التنسيقات السابقة كما هي) ... */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#333;line-height:1.6}
.header{background:#1a1a2e;color:#fff;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px}
.header-right{display:flex;gap:12px;align-items:center;font-size:14px}
.tabs{background:#fff;display:flex;gap:4px;padding:8px;overflow-x:auto;border-bottom:1px solid #ddd}
.tab{padding:8px 16px;border:none;background:transparent;cursor:pointer;font-size:14px;white-space:nowrap;border-radius:4px;transition:background .2s}
.tab:hover{background:#f5f5f5}
.tab.active{background:#1a1a2e;color:#fff}
.content{max-width:1200px;margin:0 auto;padding:1.5rem}
.card{background:#fff;border-radius:8px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:1.5rem;border-radius:8px;text-align:center}
.stat-card h3{font-size:32px;margin-bottom:8px}
.stat-card p{font-size:14px;opacity:.9}
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.dept-card{background:#f8f9fa;border:1px solid #ddd;border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s}
.dept-card:hover{background:#e9ecef;transform:translateY(-2px)}
.dept-card .icon{font-size:48px;margin-bottom:12px}
.dept-card h3{font-size:16px;margin-bottom:4px}
.dept-card p{font-size:13px;color:#666}
button{background:#1a1a2e;color:#fff;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-size:14px}
button:hover{background:#2a2a3e}
button.secondary{background:#fff;color:#333;border:1px solid #ddd}
input,select,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:14px;margin-bottom:12px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-content{background:#fff;border-radius:8px;padding:2rem;max-width:800px;width:90%;max-height:90vh;overflow-y:auto}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:14px}
table th{background:#f5f5f5;padding:12px;text-align:right;border-bottom:2px solid #ddd}
table td{padding:12px;border-bottom:1px solid #eee}
.badge{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:500}
.badge.success{background:#d4edda;color:#155724}
.badge.warning{background:#fff3cd;color:#856404}
.badge.danger{background:#f8d7da;color:#721c24}
.hidden{display:none!important}
.back-btn{background:#6c757d;margin-bottom:1rem}
.score-high{color:#28a745;font-weight:500}
.score-mid{color:#ffc107;font-weight:500}
.score-low{color:#dc3545;font-weight:500}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>أهلاً، <span id="user-name">المدير</span></h1>
    <p style="font-size:12px;opacity:.8">متوسطة سالم الحسينان</p>
  </div>
  <div class="header-right">
    <span id="current-date"></span>
    <button onclick="window.print()" style="background:transparent;border:1px solid #fff;padding:6px 12px;font-size:13px">🖨️</button>
    <button onclick="window.logout()" style="background:transparent;border:1px solid #fff;padding:6px 12px;font-size:13px">خروج</button>
  </div>
</div>

<div class="tabs" id="tabs-bar">
  <button class="tab active" data-tab="today">📊 اليوم</button>
  <button class="tab" data-tab="classes">🏫 الفصول</button>
  <button class="tab" data-tab="absent">🔴 الغائبون</button>
  <button class="tab" data-tab="repeat">⚠️ متكرر</button>
  <button class="tab" data-tab="student">👤 طالب</button>
  <button class="tab" data-tab="date">📅 تاريخ</button>
  <button class="tab" data-tab="visits">🏫 الزيارات</button>
  <button class="tab" data-tab="users">👥 المستخدمون</button>
</div>

<div class="content">
    <div id="tab-today">
        <div class="stats-grid" id="stats-cards"></div>
        <div class="card">
          <h2 style="margin-bottom:1rem">حالة تسجيل الفصول</h2>
          <div id="class-status"></div>
        </div>
    </div>
    <div id="tab-classes" class="hidden"><div class="card"><h2>اختر الفصل</h2><div id="classes-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px"></div></div><div id="class-detail" class="hidden"></div></div>
    <div id="tab-absent" class="hidden"><div class="card"><h2>🔴 الغائبون اليوم</h2><div id="absent-list"></div></div></div>
    <div id="tab-repeat" class="hidden"><div class="card"><h2>⚠️ طلاب غابوا أكثر من 5 أيام</h2><div id="repeat-list"></div></div></div>
    <div id="tab-student" class="hidden"><div class="card"><h2>👤 بحث عن طالب</h2><div class="form-grid"><select id="search-class" onchange="window.loadStudentNames()"><option value="">اختر الفصل</option></select><select id="search-student"><option value="">اختر الطالب</option></select></div><button onclick="window.searchStudent()">بحث</button><div id="student-result" style="margin-top:1.5rem"></div></div></div>
    <div id="tab-date" class="hidden"><div class="card"><h2>📅 بحث بتاريخ</h2><div class="form-grid"><select id="date-class"><option value="">اختر الفصل</option></select><input type="date" id="date-search"></div><button onclick="window.searchByDate()">بحث</button><div id="date-result" style="margin-top:1.5rem"></div></div></div>
    <div id="tab-visits" class="hidden"><div id="dept-list" class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem"><h2>🏫 الأقسام الدراسية</h2><button onclick="window.openNewVisit()" style="background:#28a745">+ زيارة جديدة</button></div><div class="dept-grid">...</div></div><div id="dept-visits" class="hidden"><button class="back-btn" onclick="window.backToDepts()">← رجوع للأقسام</button><div class="card"><h2>زيارات قسم <span id="selected-dept-name"></span></h2><div id="visits-list"></div></div></div></div>
    <div id="tab-users" class="hidden"><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><h2>👥 إدارة المستخدمين</h2><button onclick="window.openAddUser()">+ إضافة مستخدم</button></div><div id="users-list"></div></div></div>
</div>

window.switchTab = function(btn, t) {
    document.querySelectorAll('.tab').forEach(tab=>tab.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[id^="tab-"]').forEach(tab=>tab.classList.add('hidden'));
    document.getElementById('tab-'+t).classList.remove('hidden');
};

</body>
</html>
