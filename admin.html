<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة - سالم الحسينان</title>
<style>
    body { font-family: 'Segoe UI', Arial; background: #f4f7f6; margin: 0; }
    .header { background: #1a1a2e; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .tabs { background: white; padding: 10px; display: flex; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .tab { padding: 10px 20px; cursor: pointer; border: none; background: #eee; border-radius: 5px; font-weight: bold; }
    .tab.active { background: #667eea; color: white; }
    .content { padding: 20px; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    th { background: #f8f9fa; }
</style>
</head>
<body>

<div class="header">
    <div>
        <h2 id="admin-name">مرحباً يا مدير</h2>
    </div>
    <div>
        <button onclick="window.open('tv.html', '_blank')" style="background:#dc3545; color:white; border:none; padding:10px; cursor:pointer;">📺 غرفة العمليات</button>
        <button onclick="logout()" style="background:#6c757d; color:white; border:none; padding:10px; cursor:pointer;">خروج</button>
    </div>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab(this, 'today')">📊 إحصائيات</button>
    <button class="tab" onclick="switchTab(this, 'visits')">📋 الزيارات</button>
    <button class="tab" onclick="switchTab(this, 'users')">👥 المستخدمون</button>
</div>

<div class="content">
    <div id="today" class="tab-pane active">
        <div class="card">
            <h2>إحصائيات اليوم</h2>
            <div id="stats-area">جاري التحميل...</div>
        </div>
    </div>
    <div id="visits" class="tab-pane">
        <div class="card">
            <h2>سجل الزيارات</h2>
            <div id="visits-area">جاري تحميل الزيارات...</div>
        </div>
    </div>
    <div id="users" class="tab-pane">
        <div class="card">
            <h2>المستخدمون</h2>
            <div id="users-area">جاري تحميل المستخدمين...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const app = initializeApp({apiKey:"AIzaSyDEA77qGfSK7w5rYynyzP9-mvD13rRT0tU",authDomain:"hosainan-school.firebaseapp.com",projectId:"hosainan-school",storageBucket:"hosainan-school.firebasestorage.app",messagingSenderId:"264264994076",appId:"1:264264994076:web:1a87730b7d3c684bdf3ed9"});
    const db = getFirestore(app);

    // التحقق من الدخول
    if (!localStorage.getItem('hs_user')) window.location.replace('index.html');
    document.getElementById('admin-name').textContent = "مرحباً، " + JSON.parse(localStorage.getItem('hs_user')).name;

    // التنقل (مضمون 100%)
    window.switchTab = (btn, id) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.logout = () => { localStorage.removeItem('hs_user'); window.location.replace('index.html'); };

    // تحميل البيانات
    async function loadAll() {
        try {
            // إحصائيات
            const att = await getDocs(collection(db, 'attendance'));
            document.getElementById('stats-area').innerHTML = `إجمالي سجلات الغياب المسجلة: <b>${att.size}</b>`;
            
            // زيارات
            const vis = await getDocs(collection(db, 'visits'));
            let vHtml = '<table><tr><th>المعلم</th><th>القسم</th><th>التقييم</th></tr>';
            vis.forEach(d => { let v=d.data(); vHtml += `<tr><td>${v.teacherName}</td><td>${v.dept}</td><td>${v.rating}</td></tr>`; });
            document.getElementById('visits-area').innerHTML = vHtml + '</table>';
        } catch(e) { console.error(e); }
    }
    loadAll();
</script>
</body>
</html>
