<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الإدارية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --primary-color: #1a1a2e; --hover-color: #e67e22; }
        body { font-family: 'Cairo', sans-serif; background: #f4f6f9; display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: #161625; color: #fff; height: 100vh; position: fixed; right: 0; }
        .main-content { margin-right: 280px; width: 100%; padding: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .menu-item { padding: 15px; cursor: pointer; color: #b2bec3; }
        .menu-item:hover { color: #fff; border-right: 4px solid var(--hover-color); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding:20px; font-weight:900;">مدرسة سالم الحسينان</div>
        <ul style="list-style:none;">
            <li class="menu-item active" onclick="window.switchTab('tab-index')">📊 المؤشرات اليومية</li>
            <li class="menu-item" onclick="window.switchTab('tab-student')">👤 ملف الطالب</li>
        </ul>
    </div>
    <div class="main-content">
        <div id="tab-index" class="tab-content active"><div id="stats-cards"></div></div>
        <div id="tab-student" class="tab-content"></div>
    </div>

    <script type="module">
        window.switchTab = async function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            const moduleMap = {
                'tab-index': { file: './js/modules/today.js', init: 'initTodayModule' },
                'tab-student': { file: './js/modules/student.js', init: 'initStudentModule' }
            };
            
            if(moduleMap[tabId]) {
                const mod = await import(moduleMap[tabId].file);
                if(mod[moduleMap[tabId].init]) mod[moduleMap[tabId].init]();
            }
        };
    </script>
</body>
</html>
