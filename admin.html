<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المدير - متوسطة سالم الحسينان</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
    .header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:1rem 1.5rem}
    .header-top{display:flex;justify-content:space-between;align-items:center}
    .header-btns{display:flex;gap:8px}
    .header-btns button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px}
    .tabs-container{background:#fff;border-bottom:2px solid #eee;display:flex;padding:0 1rem;overflow-x:auto}
    .tab{padding:14px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:600;color:#888;border-bottom:3px solid transparent}
    .tab.active{color:#1a1a2e;border-bottom-color:#667eea;background:#f8f9ff}
    .content{max-width:1000px;margin:2rem auto;padding:0 1rem}
    .card{background:#fff;border-radius:12px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>مرحباً، <span id="admin-name">المدير</span></h1>
    </div>
    <div class="header-btns">
      <button onclick="window.open('tv.html', '_blank')" style="background:#dc3545; font-weight:bold;">📺 غرفة العمليات</button>
      <button onclick="window.logout()">خروج</button>
    </div>
  </div>
</div>

<div class="tabs-container" id="tabs-bar">
  <button class="tab active" data-tab="today">📊 إحصائيات اليوم</button>
  <button class="tab" data-tab="classes">🏫 الفصول</button>
  <button class="tab" data-tab="visits">📋 الزيارات الصفية</button>
  <button class="tab" data-tab="users">👥 المستخدمون</button>
</div>

<div class="content">
  <div id="tab-today" class="tab-pane"><div class="card"><h2>نظرة عامة</h2><div id="stats-area">جاري التحميل...</div></div></div>
  <div id="tab-classes" class="tab-pane hidden"><div class="card"><h2>الفصول</h2><div id="classes-area">جاري التحميل...</div></div></div>
  <div id="tab-visits" class="tab-pane hidden"><div class="card"><h2>الزيارات الصفية</h2><div id="visits-area">جاري التحميل...</div></div></div>
  <div id="tab-users" class="tab-pane hidden"><div class="card"><h2>المستخدمون</h2><div id="users-area">جاري التحميل...</div></div></div>
</div>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import {getFirestore,collection,getDocs} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const app = initializeApp({apiKey:"AIzaSyDEA77qGfSK7w5rYynyzP9-mvD13rRT0tU",authDomain:"hosainan-school.firebaseapp.com",projectId:"hosainan-school",storageBucket:"hosainan-school.firebasestorage.app",messagingSenderId:"264264994076",appId:"1:264264994076:web:1a87730b7d3c684bdf3ed9"});
const db = getFirestore(app);

// ربط الدوال بالـ window عشان المتصفح يشوف الأزرار
window.logout = () => {
  localStorage.removeItem('hs_user');
  window.location.href = 'index.html';
};

window.switchTab = (tabId) => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
    document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
    document.getElementById('tab-' + tabId).classList.remove('hidden');
};

// تشغيل التبويبات
document.getElementById('tabs-bar').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if(btn) window.switchTab(btn.getAttribute('data-tab'));
});

// تحميل البيانات الأساسي
async function init() {
    const user = JSON.parse(localStorage.getItem('hs_user'));
    if(user) document.getElementById('admin-name').textContent = user.name;
    
    // جلب البيانات
    const students = await getDocs(collection(db, 'students'));
    const att = await getDocs(collection(db, 'attendance'));
    document.getElementById('stats-area').innerHTML = `إجمالي الطلاب: ${students.size} | سجلات الغياب: ${att.size}`;
}
init();
</script>
</body>
</html>
