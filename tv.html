<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة القيادة الحية - المنظومة الرقمية</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b2545">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
:root {
  --navy:  #0b2545;
  --sky:   #1a78c2;
  --ice:   #eaf4fd;
  --gold:  #d4920a;
  --white: #ffffff;
  --off:   #f8f9fc;
  --line:  #e5e7eb;
  --text:  #111827;
  --mid:   #6b7280;
  --green: #059669;
  --red:   #dc2626;
}

        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #0f172a; /* لون داكن احترافي للشاشات */
            color: #fff; 
            margin: 0; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            box-sizing: border-box;
            overflow: hidden;
        }

        /* الهيدر العلوي */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #1e293b; 
            padding-bottom: 20px; 
            margin-bottom: 50px; 
        }
        .header h1 { 
            margin: 0; 
            font-size: 42px; 
            font-weight: 900; 
            color: #f1f5f9; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        .header h1 i { color: #3b82f6; }
        .school-badge {
            background: #1e293b;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 20px;
            color: #38bdf8;
            border: 1px solid #334155;
        }
        .clock { 
            font-size: 36px; 
            font-weight: 900; 
            color: #fbbf24; 
            background: rgba(0,0,0,0.3);
            padding: 10px 25px;
            border-radius: 12px;
            letter-spacing: 2px;
        }

        /* الكروت الإحصائية */
        .cards-container { 
            display: flex; 
            gap: 50px; 
            justify-content: center; 
            align-items: stretch; 
            flex: 1; 
        }
        .stat-card { 
            background: #1e293b; 
            border-radius: 24px; 
            padding: 60px 40px; 
            text-align: center; 
            flex: 1; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            border: 2px solid #334155; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .stat-card.absent { border-top: 15px solid #e74c3c; }
        .stat-card.late { border-top: 15px solid #f59e0b; }
        
        .stat-card h2 { 
            font-size: 48px; 
            margin: 0 0 20px 0; 
            color: #cbd5e1; 
            font-weight: 700;
        }
        .stat-card .number { 
            font-size: 180px; 
            font-weight: 900; 
            margin: 0; 
            line-height: 1; 
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .stat-card.absent .number { color: #e74c3c; }
        .stat-card.late .number { color: #f59e0b; }

        /* زر الخروج من الشاشة */
        .btn-exit {
            position: absolute;
            bottom: 30px;
            left: 40px;
            background: #334155;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo';
            transition: 0.3s;
        }
        .btn-exit:hover { background: #475569; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="bi bi-display"></i> شاشة القيادة المباشرة <span id="school-name-display" class="school-badge">جاري التحميل...</span></h1>
        <div class="clock" id="live-clock">00:00:00</div>
    </div>

    <div class="cards-container">
        <div class="stat-card absent">
            <h2>إجمالي الغياب اليوم</h2>
            <div class="number" id="live-absent">0</div>
        </div>
        <div class="stat-card late">
            <h2>إجمالي التأخير اليوم</h2>
            <div class="number" id="live-late">0</div>
        </div>
    </div>

    <div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:20px; margin:20px 30px; text-align:center;">
        <div style="font-size:14px; color:rgba(255,255,255,0.6); margin-bottom:12px; font-weight:800; letter-spacing:1px;">
            🛑 الفصول التي لم تسجّل الغياب اليوم
        </div>
        <div id="tv-missing" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">
            <span style="color:rgba(255,255,255,0.3); font-size:14px;">جاري الفحص واستدعاء دليل الفصول...</span>
        </div>
    </div>

    <button class="btn-exit" onclick="window.location.replace('admin.html')"><i class="bi bi-box-arrow-right"></i> إغلاق الشاشة</button>

    <script type="module">
        import { db, getActiveSchoolId, getTodayISO, getSchoolClasses } from './js/firebase-config.js';
        import { collection, query, where, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // 1. الحماية السريعة وجلب بيانات الجلسة
        const saved = localStorage.getItem('hs_user');
        if(!saved) { window.location.replace('index.html'); }
        
        const user = JSON.parse(saved);
        const schoolId = user?.schoolId;

        if (!schoolId) {
            window.showToast('❌ خطأ: لم يتم التعرف على هوية المدرسة.');
            window.location.replace('index.html');
        }

        // عرض اسم المدرسة في الشاشة العلوية
        document.getElementById('school-name-display').textContent = user.schoolName || 'المنظومة الرقمية';

        // 2. تشغيل الساعة الحية للشاشة
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').textContent = now.toLocaleTimeString('ar-KW', { hour12: false });
        }, 1000);

        // قائمة الفصول العامة للمدرسة (يتم جلبها ديناميكياً بدون قنبلة فواتير)
        let ALL_CLASSES = [];

        // 3. المحرك الموحد الموفر للفواتير: مستمع حي واحد للأرقام والفصول المتأخرة معاً
        function startLiveTVDashboard() {
            const todayISO = getTodayISO();

            const liveQuery = query(
                collection(db, 'attendance'),
                where('schoolId', '==', schoolId),
                where('date', '==', todayISO)
            );

            onSnapshot(liveQuery, (snapshot) => {
                let absentCount = 0;
                let lateCount = 0;
                const recordedClasses = new Set();
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const status = data.status;
                    if(status === 'absent') absentCount++;
                    if(status === 'late') lateCount++;
                    if(data.classId) recordedClasses.add(data.classId);
                });

                // تحديث الأرقام الكبيرة في الشاشة فوراً لايف
                const absentEl = document.getElementById('live-absent');
                const lateEl = document.getElementById('live-late');
                
                if (absentEl) absentEl.textContent = absentCount;
                if (lateEl) lateEl.textContent = lateCount;

                // رصد وتحديث الفصول المتأخرة عن التسجيل لحظياً بدون أي getDocs إضافية ومكلفة
                renderMissingClasses(recordedClasses);

            }, (error) => {
                console.error("❌ خطأ في موديول الرادار الحي للشاشة:", error);
            });
        }

        // 4. دالة معالجة وعرض الفصول المتأخرة بناءً على الدلائل المحملة
        function renderMissingClasses(recordedClassesSet) {
            const el = document.getElementById('tv-missing');
            if(!el) return;
            
            if(ALL_CLASSES.length === 0) {
                el.innerHTML = '<span style="color:rgba(255,255,255,0.3); font-size:14px;">⏳ جاري مزامنة دليل الفصول مع قاعدة البيانات...</span>';
                return;
            }

            const missing = ALL_CLASSES.filter(c => !recordedClassesSet.has(c));

            if(missing.length === 0) {
                el.innerHTML = '<span style="color:#10b981; font-weight:900; font-size:20px; animation: pulse 2s infinite; display:flex; align-items:center; gap:8px;"><i class="bi bi-check-circle-fill"></i> ممتاز! جميع الفصول رصدت الحضور والغياب اليوم بالكامل</span>';
            } else {
                el.innerHTML = missing.map(c =>
                    `<span style="background:#ef4444; color:#fff; padding:8px 18px; border-radius:10px; font-weight:900; font-size:18px; margin:4px; box-shadow:0 4px 12px rgba(239,68,68,0.25); display:inline-block; animation: pulse 2.5s infinite;">${c}</span>`
                ).join('');
            }
        }

        // 5. الانطلاق الذكي وتجهيز الهيكل عند أول فتح للشاشة
        (async function initTVPage() {
            try {
                // استدعاء دالة جلب الفصول المركزية الموفرة لقراءات الـ Documents
                ALL_CLASSES = await getSchoolClasses(db, schoolId);
            } catch(e) {
                console.error("⚠️ فشل جلب دليل الفصول الموفر للتكلفة:", e);
            }
            // تشغيل المستمع اللحظي الموحد للأمن المالي والسرعة اللامتناهية
            startLiveTVDashboard();
        })();
    </script>
    <script>
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
        }
    </script>
</body>
</html>
