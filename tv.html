<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شاشة القيادة الحية والتعاميم - المنظومة الرقمية</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#0b2545">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
:root {
  --navy:  #0b2545;
  --sky:   #1a78c2;
  --ice:   #eaf4fd;
  --gold:  #d4920a;
  --white: #ffffff;
  --off:   #f8f9fc;
  --line:  #e5e7eb;
  --text:  #111827;
  --mid:   #6b7280;
  --green: #059669;
  --red:   #dc2626;
}

        
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #0f172a; /* لون داكن احترافي للشاشات وعرض التباين */
            color: #fff; 
            margin: 0; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            box-sizing: border-box;
            overflow: hidden;
        }

        /* الهيدر العلوي */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #1e293b; 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }
        .header h1 { 
            margin: 0; 
            font-size: 36px; 
            font-weight: 900; 
            color: #f1f5f9; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        .header h1 i { color: #38bdf8; }
        .school-badge {
            background: #1e293b;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 18px;
            color: #38bdf8;
            border: 1px solid #334155;
            font-weight: bold;
        }
        .clock { 
            font-size: 32px; 
            font-weight: 900; 
            color: #fbbf24; 
            background: rgba(0,0,0,0.4);
            padding: 8px 25px;
            border-radius: 12px;
            letter-spacing: 2px;
            border: 1px solid #1e293b;
        }

        /* حاوية الكروت المركزية المشتركة */
        .cards-container { 
            display: flex; 
            gap: 24px; 
            justify-content: center; 
            align-items: stretch; 
            flex: 1; 
            min-height: 0; /* منع خروج العناصر */
        }
        .stat-card { 
            background: #1e293b; 
            border-radius: 20px; 
            padding: 30px 20px; 
            text-align: center; 
            flex: 1; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            border: 2px solid #334155; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .stat-card.absent { border-top: 12px solid #e74c3c; }
        .stat-card.late { border-top: 12px solid #f59e0b; }
        
        /* كارت الإعلانات الديناميكي الفاخر */
        .stat-card.announcements-hub { 
            flex: 1.8; 
            border-top: 12px solid #38bdf8; 
            text-align: right; 
            justify-content: flex-start; 
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, #1e293b, #111827);
        }
        
        .stat-card h2 { 
            font-size: 28px; 
            margin: 0 0 15px 0; 
            color: #cbd5e1; 
            font-weight: 800;
        }
        .stat-card .number { 
            font-size: 130px; 
            font-weight: 900; 
            margin: 0; 
            line-height: 1; 
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .stat-card.absent .number { color: #e74c3c; }
        .stat-card.late .number { color: #f59e0b; }

        /* مظهر محتوى الإعلان الدوار */
        .carousel-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 0;
            animation: fadeIn 0.5s ease-in-out;
        }
        .ann-title-view {
            font-size: 22px;
            font-weight: 900;
            color: #fbbf24;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        .ann-body-view {
            font-size: 16px;
            color: #e2e8f0;
            line-height: 1.6;
            font-weight: 600;
            white-space: pre-wrap;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
        }
        .ann-img-view {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid #475569;
        }
        .ann-footer-view {
            margin-top: auto;
            border-top: 1px dashed #334155;
            padding-top: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 700;
        }

        /* زر الخروج من الشاشة */
        .btn-exit {
            position: absolute;
            bottom: 20px;
            left: 24px;
            background: #334155;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo';
            transition: 0.3s;
            z-index: 99;
        }
        .btn-exit:hover { background: #475569; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.95; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    
/* ══ Dark Mode ══ */
body.dark-mode { background:#161e2e !important; color:#e2e8f0 !important; }
body.dark-mode .header-nav { background:#0f1928 !important; }
body.dark-mode .card { background:#1e2535 !important; border-color:#2a3650 !important; }
body.dark-mode .workspace-container > * { background:#1e2535; }
body.dark-mode input, body.dark-mode select, body.dark-mode textarea {
  background:#1e2535 !important; color:#e2e8f0 !important; border-color:#2a3650 !important;
}
body.dark-mode table th { background:#0f1928 !important; }
body.dark-mode .bottom-nav { background:#1e2535 !important; border-color:#2a3650 !important; }
body.dark-mode .stat-box { background:#1e2535 !important; border-color:#2a3650 !important; }

</style>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
/* ═══ TV Responsive ═══ */
@media (max-width: 768px) {
  body { padding: 15px; flex-direction: column; }
  .header h1 { font-size: 18px; }
  .header { margin-bottom: 12px; padding-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .clock { font-size: 20px; padding: 6px 14px; }
  .school-badge { font-size: 13px; padding: 4px 12px; }
  .cards-container { flex-direction: column; gap: 14px; height: auto; flex: none; }
  .stat-card { padding: 18px; }
  .stat-card .number { font-size: 72px; }
  .stat-card h2 { font-size: 18px; }
  .btn-exit { position: relative; bottom: auto; left: auto; width: 100%; margin-top: 14px; }
}
@media (max-width: 480px) {
  .stat-card .number { font-size: 56px; }
  body { padding: 10px; }
}
</style>

</head>
<body>

    <div class="header">
        <h1><i class="bi bi-display"></i> شاشة القيادة والتعاميم الحية <span id="school-name-display" class="school-badge">جاري التحميل...</span></h1>
        <div class="clock" id="live-clock">00:00:00</div>
    </div>

    <div class="cards-container">
        
        <div class="stat-card absent">
            <h2>إجمالي الغياب اليوم</h2>
            <div class="number" id="live-absent">0</div>
        </div>

        <div class="stat-card late">
            <h2>إجمالي التأخير اليوم</h2>
            <div class="number" id="live-late">0</div>
        </div>

        <div class="stat-card announcements-hub" id="tv-announcements-box">
            <h2><i class="bi bi-megaphone" style="color: #38bdf8;"></i> تعاميم وأخبار الإدارة</h2>
            <div id="carousel-anchor" style="width: 100%; flex: 1; display: flex; flex-direction: column;">
                <div style="text-align: center; padding: 40px; color: #94a3b8; font-weight: 700;">⏳ جاري فحص رادار الأخبار الفورية...</div>
            </div>
        </div>

    </div>

    <div style="background:rgba(30, 41, 59, 0.7); border:1px solid rgba(255,255,255,0.05); border-radius:16px; padding:15px; margin:20px 0 0 0; text-align:center;">
        <div style="font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:8px; font-weight:800; letter-spacing:1px;">
            🛑 متابعة الرصد اليومي للحصص الحالية (الفصول المتأخرة عن تسجيل الغياب)
        </div>
        <div id="tv-missing" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">
            <span style="color:rgba(255,255,255,0.3); font-size:13px;">جاري المزامنة واستدعاء دليل الفصول النشطة...</span>
        </div>
    </div>

    <button class="btn-exit" onclick="window.location.replace('admin.html')"><i class="bi bi-box-arrow-right"></i> إغلاق الشاشة</button>

    <script type="module">
        import { db, getActiveSchoolId, getTodayISO, getSchoolClasses } from './js/firebase-config.js';
        import { collection, query, where, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // 1. الحماية السريعة وجلب بيانات الجلسة
        const saved = localStorage.getItem('hs_user');
        if(!saved) { window.location.replace('index.html'); }
        
        const user = JSON.parse(saved);
        const schoolId = user?.schoolId;

        if (!schoolId) {
            window.location.replace('index.html');
        }

        // ✅ فحص صلاحيات TV - يُسمح فقط للإدارة
        const tvAllowed = ['admin', 'assistant_manager', 'wing_supervisor'];
        if (!tvAllowed.includes(user?.role)) {
            window.location.replace('index.html');
        }

        document.getElementById('school-name-display').textContent = user.schoolName || 'المنظومة الرقمية';

        // 2. تشغيل الساعة الحية للشاشة
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').textContent = now.toLocaleTimeString('ar-KW', { hour12: false });
        }, 1000);

        let ALL_CLASSES = [];
        let announcementsList = [];
        let carouselIndex = 0;
        let carouselTimer = null;

        // 3. المحرك الموحد الموفر للفواتير لعدادات الطلاب والغياب
        function startLiveTVDashboard() {
            const todayISO = getTodayISO();

            const liveQuery = query(
                collection(db, 'attendance'),
                where('schoolId', '==', schoolId),
                where('date', '==', todayISO)
            );

            onSnapshot(liveQuery, (snapshot) => {
                let absentCount = 0;
                let lateCount = 0;
                const recordedClasses = new Set();
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const status = data.status;
                    if(status === 'absent') absentCount++;
                    if(status === 'late') lateCount++;
                    if(data.classId) recordedClasses.add(data.classId);
                });

                const absentEl = document.getElementById('live-absent');
                const lateEl = document.getElementById('live-late');
                
                if (absentEl) absentEl.textContent = absentCount;
                if (lateEl) lateEl.textContent = lateCount;

                renderMissingClasses(recordedClasses);

            }, (error) => {
                console.error("❌ خطأ في موديول الرادار الحي للشاشة:", error);
            });
        }

        // 4. مستمع جدار التعاميم والأخبار لايف الدوار بالـ TV
        function listenToAnnouncementsLive() {
            const q = query(collection(db, 'announcements'), where('schoolId', '==', schoolId));

            onSnapshot(q, (snapshot) => {
                announcementsList = [];
                snapshot.forEach(doc => {
                    announcementsList.push(doc.data());
                });

                // ترتيب محلي من الأحدث للأقدم لتجنب طلب فهارس مركبة معقدة
                announcementsList.sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));

                carouselIndex = 0;
                runCarouselRotation();
            });
        }

        // 5. موديول تشغيل وإدارة دورة عرض الإعلانات تلقائياً
        function runCarouselRotation() {
            if (carouselTimer) clearInterval(carouselTimer);
            
            const anchor = document.getElementById('carousel-anchor');
            if (!anchor) return;

            if (announcementsList.length === 0) {
                anchor.innerHTML = `
                    <div style="text-align:center; padding:50px 20px; color:#64748b; font-weight:700;">
                        <i class="bi bi-info-circle" style="font-size:36px; display:block; margin-bottom:10px; color:#475569;"></i>
                        لا توجد تعاميم أو أخبار إدارية منشورة على الشاشة حالياً.
                    </div>`;
                return;
            }

            // دالة حقن الإعلان النشط الحالي في الواجهة مع الفيد إن
            const paintAnnouncement = () => {
                const ann = announcementsList[carouselIndex];
                if (!ann) return;

                anchor.innerHTML = `
                    <div class="carousel-wrapper">
                        <div>
                            <div class="ann-title-view">${ann.title}</div>
                            <div class="ann-body-view">${ann.content}</div>
                            ${ann.imageUrl ? `<img src="${ann.imageUrl}" class="ann-img-view">` : ''}
                        </div>
                        <div class="ann-footer-view">
                            <span><i class="bi bi-person-badge"></i> أصدره: ${ann.publisherName || 'الإدارة'}</span>
                            <span><i class="bi bi-calendar-event"></i> ${ann.dateStr || ''}</span>
                        </div>
                    </div>
                `;

                // التمرير البرمجي للإعلان القادم في الدورة
                carouselIndex = (carouselIndex + 1) % announcementsList.length;
            };

            // تشغيل اللقطة الأولى فوراً
            paintAnnouncement();

            // ضبط التدوير الأوتوماتيكي للشاشة كل 8 ثوانٍ بالتمام والكمال
            if (announcementsList.length > 1) {
                carouselTimer = setInterval(paintAnnouncement, 8000);
            }
        }

        // 6. دالة تصفية وعرض الفصول المتأخرة بناءً على الدلائل المحملة
        function renderMissingClasses(recordedClassesSet) {
            const el = document.getElementById('tv-missing');
            if(!el) return;
            
            if(ALL_CLASSES.length === 0) {
                el.innerHTML = '<span style="color:rgba(255,255,255,0.3); font-size:13px;">⏳ جاري مزامنة دليل الفصول مع قاعدة البيانات...</span>';
                return;
            }

            const missing = ALL_CLASSES.filter(c => !recordedClassesSet.has(c));

            if(missing.length === 0) {
                el.innerHTML = '<span style="color:#10b981; font-weight:900; font-size:18px; animation: pulse 2s infinite; display:flex; align-items:center; gap:8px;"><i class="bi bi-check-circle-fill"></i> ممتاز! جميع الفصول رصدت وأتمت كشوف الغياب اليوم بالكامل</span>';
            } else {
                el.innerHTML = missing.map(c =>
                    `<span style="background:#ef4444; color:#fff; padding:6px 14px; border-radius:8px; font-weight:900; font-size:15px; margin:2px; box-shadow:0 4px 10px rgba(239,68,68,0.2); display:inline-block; animation: pulse 2.5s infinite;">${c}</span>`
                ).join('');
            }
        }

        // 7. انطلاق شاشة العرض
        (async function initTVPage() {
            try {
                ALL_CLASSES = await getSchoolClasses(db, schoolId);
            } catch(e) {
                console.error("⚠️ فشل جلب دليل الفصول الموفر للتكلفة:", e);
            }
            startLiveTVDashboard();
            listenToAnnouncementsLive();
        })();
    </script>
    <script>
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
        }
    </script>

<script>
if(localStorage.getItem('hs_dark_mode')==='1') document.body.classList.add('dark-mode');
</script>
</body>
</html>
