<script>
    // التأكد من تسجيل الدخول
    var saved = localStorage.getItem('hs_user');
    if (!saved) {
        window.location.replace('index.html');
    } else {
        try {
            var user = JSON.parse(saved);
            document.getElementById('user-name').textContent = user.name || 'مستخدم';
            
            // قاموس الرتب لعرض مسمى وظيفي احترافي
            const roleTitles = {
                "admin": "👑 إدارة عليا",
                "assistant_manager": "👔 مدير مساعد",
                "social_worker": "📝 أخصائي اجتماعي",
                "wing_supervisor": "🔎 مشرف جناح",
                "guard": "🚪 حارس أمن",
                "teacher": "👨‍🏫 معلم"
            };
            
            document.getElementById('user-role').textContent = roleTitles[user.role] || 'عضو المنظومة';

            // منطق إظهار الكروت حسب الدور (Role-Based Access)
            // نأخذ جميع الكروت أولاً
            const allCards = document.querySelectorAll('.action-card');
            
            // إظهار الكروت بناءً على الصلاحية
            if (user.role === 'admin' || user.role === 'assistant_manager') {
                // المدير والمساعد يشوفون كل شيء
                allCards.forEach(card => card.style.display = 'block');
            } else if (user.role === 'social_worker') {
                // الأخصائي يشوف كروت معينة
                document.getElementById('card-admin').style.display = 'block'; // إذا عنده صلاحيات إدارة مصغرة
                document.getElementById('card-teacher').style.display = 'block';
            } else if (user.role === 'wing_supervisor') {
                document.getElementById('card-teacher').style.display = 'block';
            } else if (user.role === 'guard') {
                document.getElementById('card-admin').style.display = 'block'; // حارس الأمن يدخل للبوابة
            } else {
                // المعلم يشوف كرت التدريس فقط
                document.getElementById('card-teacher').style.display = 'block';
            }

        } catch(e) {
            window.location.replace('index.html');
        }
    }

    function logout() {
        localStorage.removeItem('hs_user');
        window.location.replace('index.html');
    }
</script>
